<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>英途 · 英语冒险</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --p:#5b4ff0;--p2:#7b6ff8;--p3:#eceaff;--p4:#f5f4ff;
  --gold:#f5a623;--gold2:#ffd166;--gold3:#fff8e8;
  --green:#06d6a0;--green2:#34e8b8;--green3:#e0fff6;
  --red:#ef233c;--red2:#ff6b7a;--red3:#fff0f2;
  --blue:#4cc9f0;--blue2:#74d7f5;--blue3:#e8f9ff;
  --orange:#fb5607;--orange2:#ff8c42;--orange3:#fff3eb;
  --pink:#f72585;--pink2:#ff6eb4;--pink3:#fff0f7;
  --bg:#f0eeff;--bg2:#faf9ff;--bg3:#fff;
  --ink:#150e3a;--ink2:#3d3470;--ink3:#7a72a8;--ink4:#c0b8e0;
  --nav:60px;--safe:env(safe-area-inset-bottom,0px);
  --r:14px;--r2:22px;--r3:32px;
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{color:var(--ink);font-family:-apple-system,"Noto Sans SC",system-ui,sans-serif;font-size:14px;line-height:1.5}
button{cursor:pointer;font-family:inherit;border:none;outline:none;transition:all .18s cubic-bezier(.34,1.56,.64,1)}
button:active{transform:scale(.94)}
input,textarea{font-family:inherit;outline:none}
::-webkit-scrollbar{display:none}

/* ── SHELL ── */
.app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;background:var(--bg);overflow:hidden}
.sb{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav)+var(--safe)+8px)}
.pg{display:none}.pg.on{display:block}

/* ── NAV ── */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:calc(var(--nav)+var(--safe));padding-bottom:var(--safe);background:rgba(255,255,255,.97);backdrop-filter:blur(24px);border-top:1px solid rgba(91,79,240,.1);display:flex;z-index:100;box-shadow:0 -4px 20px rgba(91,79,240,.08)}
.nt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;color:var(--ink4);font-size:10px;font-weight:700;padding:.5rem .25rem}
.nt.on{color:var(--p)}
.nt-ico{font-size:22px;width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.nt.on .nt-ico{background:var(--p3);transform:scale(1.15)}
.nt-fab{flex:1.3}
.nt-fab-btn{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--p),#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:26px;margin-top:-20px;box-shadow:0 6px 24px rgba(91,79,240,.45);border:3px solid var(--bg3);cursor:pointer;animation:fab-pulse 3s ease-in-out infinite}
@keyframes fab-pulse{0%,100%{box-shadow:0 6px 24px rgba(91,79,240,.45)}50%{box-shadow:0 6px 32px rgba(91,79,240,.65),0 0 0 6px rgba(91,79,240,.1)}}

/* ── TOAST ── */
.toast{position:fixed;top:.875rem;left:50%;transform:translateX(-50%) translateY(-80px);background:rgba(21,14,58,.93);color:#fff;padding:.7rem 1.25rem;border-radius:var(--r2);font-size:13.5px;font-weight:700;z-index:999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 8px 28px rgba(91,79,240,.3)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(15,10,48,.65);z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(8px)}
.modal-sheet{background:var(--bg3);border-radius:var(--r3) var(--r3) 0 0;padding:1.375rem 1.25rem calc(1.375rem + env(safe-area-inset-bottom,0px));width:100%;max-width:430px;margin:0 auto;box-shadow:0 -16px 48px rgba(91,79,240,.2)}
.modal-drag{width:44px;height:4px;border-radius:2px;background:var(--ink4);margin:0 auto 1rem}
.modal-title{font-size:20px;font-weight:900;color:var(--ink);margin-bottom:1rem}

/* ── SHARED ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.375rem;padding:.75rem 1.375rem;border-radius:var(--r2);font-size:14px;font-weight:800;cursor:pointer;border:none}
.btn:active{transform:scale(.96)}
.btn-p{background:linear-gradient(135deg,var(--p),#8b5cf6);color:#fff;box-shadow:0 6px 20px rgba(91,79,240,.38)}
.btn-gold{background:linear-gradient(135deg,var(--gold),#f97316);color:#fff;box-shadow:0 6px 20px rgba(245,166,35,.38)}
.btn-green{background:linear-gradient(135deg,var(--green),var(--blue));color:#fff;box-shadow:0 6px 20px rgba(6,214,160,.35)}
.btn-ghost{background:var(--bg2);color:var(--ink2);border:1.5px solid var(--bg)}
.btn-sm{padding:.45rem .875rem;font-size:12.5px;border-radius:var(--r)}
.btn-full{width:100%}
.btn-danger{background:var(--red3);color:var(--red)}

.field{margin-bottom:.875rem}
.flabel{font-size:10.5px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem;display:block}
.finp{width:100%;padding:.75rem 1rem;border:2px solid var(--bg);border-radius:var(--r);font-size:14px;background:var(--bg2);color:var(--ink);-webkit-appearance:none;transition:all .15s}
.finp:focus{border-color:var(--p);background:var(--bg3);box-shadow:0 0 0 4px rgba(91,79,240,.12)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:.625rem}
textarea.finp{resize:none;min-height:90px;line-height:1.6}

/* ── REWARD POPUP ── */
.reward-pop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:var(--bg3);border-radius:var(--r3);padding:2rem 1.5rem;text-align:center;z-index:300;box-shadow:0 20px 60px rgba(91,79,240,.3);width:280px;transition:transform .4s cubic-bezier(.34,1.56,.64,1)}
.reward-pop.show{transform:translate(-50%,-50%) scale(1)}
.rp-emoji{font-size:60px;display:block;margin-bottom:.75rem;animation:bounce .5s ease}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
.rp-title{font-size:24px;font-weight:900;color:var(--ink);margin-bottom:.25rem}
.rp-sub{font-size:14px;color:var(--ink3);margin-bottom:1.25rem}
.rp-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:299;backdrop-filter:blur(4px)}

/* ══════════════════════════════════════
   HOME PAGE
══════════════════════════════════════ */
.home-wrap{background:linear-gradient(170deg,#e2dcff 0%,#dce8ff 50%,#dcf5ee 100%);min-height:100%}

/* Top status bar */
.home-topbar{padding:.875rem 1.25rem .5rem;display:flex;align-items:center;justify-content:space-between}
.htb-left{display:flex;flex-direction:column}
.htb-name{font-size:21px;font-weight:900;color:var(--ink)}
.htb-sub{font-size:12px;color:var(--ink3);margin-top:1px}
.htb-right{display:flex;gap:.5rem;align-items:center}
.stat-pill{background:rgba(255,255,255,.85);backdrop-filter:blur(8px);border-radius:25px;padding:.3rem .875rem;font-size:13px;font-weight:800;display:flex;align-items:center;gap:.375rem;box-shadow:0 3px 12px rgba(0,0,0,.08)}

/* Energy bar */
.energy-bar{margin:.25rem 1.25rem .75rem;display:flex;align-items:center;gap:.625rem}
.eb-ico{font-size:18px}
.eb-track{flex:1;height:12px;background:rgba(255,255,255,.5);border-radius:6px;overflow:hidden;border:1.5px solid rgba(255,255,255,.8)}
.eb-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,#ef233c,#f72585);transition:width .6s}
.eb-text{font-size:12px;font-weight:800;color:var(--ink3);white-space:nowrap}

/* XP / Level */
.level-card{margin:.25rem 1.25rem .875rem;background:rgba(255,255,255,.75);backdrop-filter:blur(10px);border-radius:var(--r2);padding:.875rem 1rem;display:flex;align-items:center;gap:.875rem;box-shadow:0 4px 16px rgba(91,79,240,.12)}
.lc-badge{width:52px;height:52px;border-radius:18px;background:linear-gradient(135deg,var(--p),#8b5cf6);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 14px rgba(91,79,240,.35)}
.lc-lv{font-size:10px;font-weight:800;color:rgba(255,255,255,.8);line-height:1}
.lc-num{font-size:22px;font-weight:900;color:#fff;line-height:1}
.lc-right{flex:1;min-width:0}
.lc-name{font-size:14px;font-weight:800;color:var(--ink);margin-bottom:.375rem}
.lc-xp-wrap{display:flex;align-items:center;gap:.5rem}
.lc-bar{flex:1;height:8px;background:rgba(91,79,240,.12);border-radius:4px;overflow:hidden}
.lc-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--p),#8b5cf6);transition:width .8s cubic-bezier(.34,1.56,.64,1)}
.lc-xp-text{font-size:11px;font-weight:700;color:var(--ink3);white-space:nowrap}

/* Daily mission */
.mission-card{margin:.25rem 1.25rem .875rem;border-radius:var(--r2);overflow:hidden;position:relative;cursor:pointer;box-shadow:0 10px 36px rgba(91,79,240,.25)}
.mc-bg{height:190px;background:linear-gradient(135deg,#bfb0ff 0%,#90c8ff 60%,#b0f0d8 100%);position:relative;overflow:hidden}
.mc-scene{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:space-evenly;padding:0 .5rem}
.mc-el{line-height:1;margin-bottom:.5rem;font-size:44px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.15))}
.mc-road{position:absolute;bottom:0;left:0;right:0;height:40%;background:linear-gradient(180deg,transparent,rgba(120,80,255,.2))}
.mc-cloud1{position:absolute;top:8%;left:8%;font-size:30px;opacity:.6;animation:drift 8s ease-in-out infinite}
.mc-cloud2{position:absolute;top:15%;right:12%;font-size:22px;opacity:.5;animation:drift 10s ease-in-out infinite reverse}
@keyframes drift{0%,100%{transform:translateX(0)}50%{transform:translateX(8px)}}
.mc-text{position:absolute;inset:0;background:linear-gradient(110deg,rgba(60,30,160,.78) 0%,rgba(60,30,160,.4) 55%,transparent 100%);padding:1.125rem 1.25rem;display:flex;flex-direction:column;justify-content:flex-end}
.mc-tag{font-size:10.5px;font-weight:800;color:rgba(255,255,255,.75);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.25rem}
.mc-title{font-size:21px;font-weight:900;color:#fff;line-height:1.2}
.mc-day{display:inline-block;background:rgba(255,255,255,.25);backdrop-filter:blur(4px);border-radius:20px;padding:2px 10px;font-size:12px;font-weight:800;color:#fff;margin-left:.5rem;vertical-align:middle}
.mc-tasks{margin:.5rem 0 .875rem}
.mc-task{font-size:13px;color:rgba(255,255,255,.9);display:flex;align-items:center;gap:.375rem;margin-top:.25rem}
.mc-task.done{text-decoration:line-through;opacity:.55}
.mc-btn{background:rgba(255,255,255,.92);color:var(--p);border-radius:25px;padding:.6rem 1.375rem;font-size:14px;font-weight:900;display:inline-flex;align-items:center;gap:.5rem;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.15);width:fit-content}

/* Quick actions */
.quick-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:.375rem;padding:0 1.25rem .875rem}
.qa{display:flex;flex-direction:column;align-items:center;gap:.375rem;cursor:pointer}
.qa:active .qa-ico{transform:scale(.9)}
.qa-ico{width:54px;height:54px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 4px 16px rgba(0,0,0,.1);transition:transform .15s}
.qa-label{font-size:11px;font-weight:700;color:var(--ink2)}

/* Map / 7day path */
.map-section{margin:0 1.25rem .875rem;background:var(--bg3);border-radius:var(--r2);overflow:hidden;box-shadow:0 4px 20px rgba(91,79,240,.1)}
.map-header{padding:.875rem 1rem .5rem;display:flex;align-items:center;justify-content:space-between}
.map-title{font-size:15px;font-weight:900;color:var(--ink)}
.map-more{font-size:13px;font-weight:700;color:var(--p);background:none;cursor:pointer;border:none}
.map-scroll{display:flex;gap:.75rem;padding:.5rem 1rem 1rem;overflow-x:auto}
.day-node{flex-shrink:0;width:68px;display:flex;flex-direction:column;align-items:center;gap:.375rem;cursor:pointer}
.dn-circle{width:52px;height:52px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;transition:all .2s}
.dn-circle:active{transform:scale(.93)}
.dn-unlocked{background:linear-gradient(135deg,var(--p),#8b5cf6);box-shadow:0 4px 14px rgba(91,79,240,.38)}
.dn-current{background:linear-gradient(135deg,var(--gold),var(--orange));box-shadow:0 4px 14px rgba(245,166,35,.45);animation:glow-gold 2s ease-in-out infinite}
@keyframes glow-gold{0%,100%{box-shadow:0 4px 14px rgba(245,166,35,.45)}50%{box-shadow:0 4px 22px rgba(245,166,35,.7),0 0 0 6px rgba(245,166,35,.15)}}
.dn-locked{background:var(--bg);border:2px dashed var(--ink4)}
.dn-done{background:linear-gradient(135deg,var(--green),var(--blue))}
.dn-ico{font-size:22px;line-height:1}
.dn-day{font-size:9px;font-weight:800;color:rgba(255,255,255,.8);line-height:1;margin-top:1px}
.dn-label{font-size:11px;font-weight:700;color:var(--ink2);text-align:center;line-height:1.2}
.dn-stars{font-size:12px;letter-spacing:-1px}

/* Progress + mascot */
.prog-row{display:grid;grid-template-columns:1.05fr .95fr;gap:.75rem;margin:0 1.25rem .875rem}
.prog-card{background:var(--bg3);border-radius:var(--r2);padding:.875rem 1rem;box-shadow:0 4px 20px rgba(91,79,240,.1)}
.pc-title{font-size:13.5px;font-weight:800;color:var(--ink);margin-bottom:.75rem}
.ring-row{display:flex;align-items:center;gap:.75rem}
.r-svg{width:66px;height:66px;flex-shrink:0}
.r-stats{flex:1}
.rs{display:flex;justify-content:space-between;padding:.2rem 0;border-bottom:.5px solid var(--bg)}
.rs:last-child{border:none}
.rs-l{font-size:11.5px;color:var(--ink3)}
.rs-v{font-size:12.5px;font-weight:800;color:var(--p)}
.pc-btn{margin-top:.75rem;width:100%;padding:.5rem;background:var(--p3);border-radius:var(--r);border:none;font-size:12.5px;font-weight:700;color:var(--p);cursor:pointer;text-align:center}

.mascot-card{background:linear-gradient(150deg,var(--p3),var(--blue3));border-radius:var(--r2);padding:.875rem;box-shadow:0 4px 20px rgba(91,79,240,.1);display:flex;flex-direction:column;align-items:center;overflow:hidden;position:relative}
.mc2-bg{position:absolute;bottom:-10px;right:-10px;font-size:72px;opacity:.08}
.mc2-bubble{background:var(--bg3);border-radius:var(--r2) var(--r2) var(--r2) 4px;padding:.625rem .875rem;font-size:12.5px;font-weight:700;color:var(--ink);line-height:1.45;width:100%;box-shadow:0 2px 10px rgba(91,79,240,.1);margin-bottom:.5rem;z-index:1;position:relative}
.mc2-fig{font-size:56px;line-height:1;animation:bobble 2.5s ease-in-out infinite;z-index:1;position:relative}
@keyframes bobble{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-10px) rotate(3deg)}}
.mc2-btn{font-size:11.5px;color:var(--ink3);display:flex;align-items:center;gap:.25rem;background:none;border:none;cursor:pointer;font-weight:600;z-index:1;position:relative}

/* Streak calendar */
.streak-card{margin:0 1.25rem .875rem;background:var(--bg3);border-radius:var(--r2);padding:1rem;box-shadow:0 4px 20px rgba(91,79,240,.1)}
.streak-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem}
.streak-title{font-size:13.5px;font-weight:800;color:var(--ink)}
.streak-count{font-size:14px;font-weight:900;color:var(--orange);display:flex;align-items:center;gap:.25rem}
.cal-row{display:flex;gap:.375rem;justify-content:space-between}
.cal-day{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.cal-l{font-size:9.5px;font-weight:700;color:var(--ink4)}
.cal-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;background:var(--bg)}
.cal-dot.done{background:linear-gradient(135deg,var(--orange),var(--gold));box-shadow:0 3px 10px rgba(245,166,35,.35)}
.cal-dot.today{background:linear-gradient(135deg,var(--p),#8b5cf6);box-shadow:0 3px 10px rgba(91,79,240,.35);animation:glow-p 2s ease-in-out infinite}
@keyframes glow-p{0%,100%{box-shadow:0 3px 10px rgba(91,79,240,.35)}50%{box-shadow:0 3px 16px rgba(91,79,240,.6),0 0 0 4px rgba(91,79,240,.1)}}

/* Recommend */
.sec-hd{display:flex;align-items:center;justify-content:space-between;padding:.5rem 1.25rem .375rem}
.sec-t{font-size:15px;font-weight:900;color:var(--ink)}
.sec-m{font-size:12.5px;font-weight:700;color:var(--p);background:none;border:none;cursor:pointer}
.rec-scroll{display:flex;gap:.75rem;padding:.25rem 1.25rem 1rem;overflow-x:auto}
.rec-c{flex-shrink:0;width:135px;border-radius:var(--r2);overflow:hidden;background:var(--bg3);box-shadow:0 4px 16px rgba(91,79,240,.1);cursor:pointer}
.rec-c:active{transform:scale(.96)}
.rc-thumb{height:86px;display:flex;align-items:center;justify-content:center;font-size:38px;position:relative}
.rc-play{position:absolute;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;font-size:12px;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.rc-body{padding:.625rem .75rem .75rem}
.rc-name{font-size:13px;font-weight:800;color:var(--ink);margin-bottom:2px}
.rc-sub{font-size:11px;color:var(--ink3)}
.rc-word{font-size:18px;font-weight:900;color:var(--ink)}
.rc-ph{font-size:10.5px;color:var(--orange);font-style:italic;font-weight:700}

/* ══════════════════════════════════════
   GAME / PRACTICE PAGE
══════════════════════════════════════ */
.game-bg{background:linear-gradient(180deg,var(--p4) 0%,var(--bg) 50%);min-height:100%}
.game-header{padding:.875rem 1.25rem .5rem;display:flex;align-items:center;justify-content:space-between}
.gh-hearts{display:flex;gap:4px}
.gh-heart{font-size:22px;transition:all .3s}
.gh-score{background:var(--gold3);border-radius:20px;padding:.25rem .875rem;font-size:12.5px;font-weight:800;color:var(--gold);border:1.5px solid var(--gold2)}
.g-bar-wrap{padding:.125rem 1.25rem .875rem}
.g-bar{height:10px;background:rgba(91,79,240,.1);border-radius:5px;overflow:hidden;position:relative}
.g-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--p),#8b5cf6);transition:width .5s;position:relative;overflow:hidden}
.g-fill::after{content:"";position:absolute;top:0;right:0;bottom:0;width:20px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4));animation:shine 1.5s ease-in-out infinite}
@keyframes shine{0%,100%{opacity:0}50%{opacity:1}}
.g-counter{text-align:right;font-size:11.5px;font-weight:700;color:var(--ink3);margin-top:.25rem}

.word-card{background:var(--bg3);border-radius:var(--r2);margin:0 1.25rem .875rem;padding:1.375rem 1.125rem;box-shadow:0 8px 32px rgba(91,79,240,.15);text-align:center}
.wc-hint{font-size:11px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.625rem}
.speak-ring{width:82px;height:82px;border-radius:50%;background:linear-gradient(135deg,var(--p),#8b5cf6);display:flex;align-items:center;justify-content:center;margin:.25rem auto .625rem;cursor:pointer;font-size:34px;border:none;box-shadow:0 6px 24px rgba(91,79,240,.42);position:relative}
.speak-ring::after{content:"";position:absolute;inset:-8px;border-radius:50%;border:2px solid rgba(91,79,240,.2);animation:ring-pulse 2s ease-in-out infinite}
@keyframes ring-pulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.12);opacity:0}}
.speak-ring.playing{background:linear-gradient(135deg,var(--green),var(--blue))}
.speak-ring.playing::after{border-color:rgba(6,214,160,.3)}
.wc-sub{font-size:12px;color:var(--ink4);margin-bottom:.5rem}
.wc-ph{font-size:15px;color:var(--gold);font-style:italic;font-weight:700}
.wc-stag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:800;margin-top:.5rem}

.mean-card{background:linear-gradient(135deg,var(--p4),var(--blue3));border-radius:var(--r2);margin:0 1.25rem .875rem;padding:1rem 1.125rem;border:1.5px solid rgba(91,79,240,.12)}
.mc-pos{font-size:10px;font-weight:800;color:var(--p);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.25rem}
.mc-cn{font-size:20px;font-weight:900;color:var(--ink);text-align:center;margin-bottom:.25rem}
.mc-ex{font-size:12.5px;color:var(--ink3);font-style:italic;text-align:center;line-height:1.5}

.slots{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:0 1.25rem .875rem;min-height:50px;align-items:center}
.slot{width:34px;height:44px;border-bottom:3px solid var(--ink4);display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:900;text-transform:lowercase;transition:all .15s}
.slot.act{border-color:var(--p)}
.slot.sp{border-bottom-color:transparent;width:12px}
.slot.ok{border-color:var(--green);color:var(--green);background:var(--green3);border-radius:8px 8px 0 0}
.slot.ng{border-color:var(--red);color:var(--red);background:var(--red3);border-radius:8px 8px 0 0}

.kbd{display:flex;flex-direction:column;gap:5px;margin:0 .75rem .875rem}
.krow{display:flex;gap:4px;justify-content:center}
.key{min-width:30px;height:44px;border-radius:10px;background:var(--bg3);font-size:15px;font-weight:800;color:var(--ink);border:none;box-shadow:0 3px 0 var(--ink4);cursor:pointer;transition:all .1s}
.key:active{transform:translateY(2px);box-shadow:0 1px 0 var(--ink4)}
.key.bs{min-width:48px;font-size:12.5px;background:var(--bg2);box-shadow:0 3px 0 var(--ink4)}

.ans-btn{display:block;width:calc(100% - 2.5rem);margin:0 1.25rem .625rem;padding:15px;color:#fff;font-size:15px;font-weight:900;border-radius:var(--r2);border:none;cursor:pointer;letter-spacing:.02em;transition:all .18s}
.ans-btn:disabled{opacity:.3;cursor:default}
.ab-my{background:linear-gradient(135deg,var(--p),#8b5cf6);box-shadow:0 6px 20px rgba(91,79,240,.38)}
.ab-c4{background:linear-gradient(135deg,var(--pink),var(--orange));box-shadow:0 6px 20px rgba(247,37,133,.32)}
.ab-c6{background:linear-gradient(135deg,var(--blue),var(--p));box-shadow:0 6px 20px rgba(76,201,240,.3)}
.ab-all{background:linear-gradient(135deg,var(--green),var(--blue));box-shadow:0 6px 20px rgba(6,214,160,.32)}

.next-btn{display:block;width:calc(100% - 2.5rem);margin:0 1.25rem .625rem;padding:15px;background:var(--bg3);color:var(--ink);font-size:15px;font-weight:800;border-radius:var(--r2);border:2px solid var(--bg);box-shadow:0 4px 16px rgba(0,0,0,.06);cursor:pointer}
.fb-ok{background:var(--green3);border:1.5px solid var(--green2);border-radius:var(--r);margin:0 1.25rem .625rem;padding:.75rem 1rem;font-size:14px;font-weight:800;color:var(--green);text-align:center}
.fb-ng{background:var(--red3);border:1.5px solid #ffb3ba;border-radius:var(--r);margin:0 1.25rem .625rem;padding:.75rem 1rem;font-size:14px;font-weight:800;color:var(--red);text-align:center}

.choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:.625rem;margin:0 1.25rem .875rem}
.ch{padding:14px 10px;border:2px solid var(--bg);border-radius:var(--r);background:var(--bg3);font-size:13.5px;cursor:pointer;text-align:left;font-weight:600;line-height:1.4;box-shadow:0 3px 12px rgba(91,79,240,.07);transition:all .15s}
.ch:active{background:var(--p3)}
.ch.ok{background:var(--green3);border-color:var(--green);color:var(--green)}
.ch.ng{background:var(--red3);border-color:var(--red);color:var(--red)}
.ch.sh{background:var(--green3);border-color:var(--green);color:var(--green)}

.finish-wrap{padding:2rem 1.5rem;text-align:center}
.fw-emoji{font-size:72px;display:block;margin-bottom:.875rem;animation:bounce .5s ease}
.fw-title{font-size:28px;font-weight:900;color:var(--ink);margin-bottom:.25rem}
.fw-sub{font-size:14px;color:var(--ink3);margin-bottom:.5rem}
.fw-rewards{display:flex;gap:.625rem;justify-content:center;margin-bottom:1.25rem;flex-wrap:wrap}
.fw-reward{background:var(--gold3);border-radius:25px;padding:.375rem .875rem;font-size:13.5px;font-weight:800;color:var(--gold);display:flex;align-items:center;gap:.375rem}
.fw-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.625rem;margin-bottom:1.5rem}
.fws{background:var(--bg2);border-radius:var(--r2);padding:.875rem .5rem;text-align:center}
.fws-n{font-size:26px;font-weight:900}
.fws-l{font-size:11px;color:var(--ink3);margin-top:2px;font-weight:700}

/* ══════════════════════════════════════
   DIALOGUE / SCENARIO PAGE
══════════════════════════════════════ */
.dlg-header{background:linear-gradient(135deg,var(--orange),var(--gold));padding:1rem 1.25rem 1.375rem;border-radius:0 0 var(--r2) var(--r2);margin-bottom:.75rem;color:#fff}
.dlg-title{font-size:20px;font-weight:900}
.dlg-sub{font-size:13px;opacity:.85;margin-top:.25rem}
.scene-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;padding:0 1.25rem 1rem}
.scene-card{border-radius:var(--r2);overflow:hidden;cursor:pointer;box-shadow:0 6px 24px rgba(0,0,0,.1);transition:transform .2s;position:relative}
.scene-card:active{transform:scale(.96)}
.sc-img{height:100px;display:flex;align-items:center;justify-content:center;font-size:48px}
.sc-body{padding:.75rem .875rem .875rem}
.sc-name{font-size:14px;font-weight:800;color:#fff}
.sc-desc{font-size:11.5px;color:rgba(255,255,255,.8);margin-top:2px}
.sc-lock{position:absolute;top:.5rem;right:.5rem;background:rgba(0,0,0,.35);border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:12px}

/* Dialogue chat */
.dlg-chat{padding:0 1.25rem 1rem}

.dsh-title{font-size:15px;font-weight:800;color:var(--ink)}
.dsh-desc{font-size:13px;color:var(--ink3);margin-top:.25rem}
.chat-msgs{display:flex;flex-direction:column;gap:.625rem;margin-bottom:.875rem;max-height:320px;overflow-y:auto}
.msg{display:flex;align-items:flex-end;gap:.5rem;max-width:85%}
.msg.ai{align-self:flex-start}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.msg-bubble{padding:.625rem .875rem;border-radius:var(--r2);font-size:14px;font-weight:500;line-height:1.5}
.msg.ai .msg-bubble{background:var(--bg3);color:var(--ink);border-radius:4px var(--r2) var(--r2) var(--r2);box-shadow:0 2px 10px rgba(91,79,240,.1)}
.msg.user .msg-bubble{background:linear-gradient(135deg,var(--p),#8b5cf6);color:#fff;border-radius:var(--r2) 4px var(--r2) var(--r2)}
.msg-ph{font-size:11.5px;color:var(--ink3);font-style:italic;margin-top:2px}
.chat-choices{display:flex;flex-direction:column;gap:.5rem}
.chat-choice{background:var(--bg3);border-radius:var(--r);padding:.75rem 1rem;font-size:14px;font-weight:600;color:var(--ink);cursor:pointer;border:2px solid var(--bg);box-shadow:0 2px 8px rgba(91,79,240,.08);text-align:left;transition:all .15s}
.chat-choice:active{background:var(--p3);border-color:var(--p);color:var(--p)}
.chat-choice.selected{background:linear-gradient(135deg,var(--p),#8b5cf6);color:#fff;border-color:transparent}
.chat-choice.correct{background:var(--green3);border-color:var(--green);color:var(--green)}
.dlg-input-wrap{background:var(--bg3);border-radius:var(--r2);padding:.875rem 1rem;box-shadow:0 3px 14px rgba(91,79,240,.1)}
.dlg-input{width:100%;border:none;background:none;font-size:14px;font-weight:500;color:var(--ink);resize:none;min-height:56px;line-height:1.5}
.dlg-actions{display:flex;gap:.5rem;margin-top:.625rem}

/* ══════════════════════════════════════
   SPEAKING PAGE
══════════════════════════════════════ */
.sp-header{background:linear-gradient(135deg,var(--green),var(--blue));padding:1rem 1.25rem 1.375rem;border-radius:0 0 var(--r2) var(--r2);margin-bottom:.75rem;color:#fff}
.sp-dots{display:flex;gap:.375rem;justify-content:center;padding:.625rem 0 .25rem}
.sp-dot{width:8px;height:8px;border-radius:50%;background:var(--ink4);transition:all .3s}
.sp-dot.done{background:var(--green)}
.sp-dot.cur{background:var(--p);width:22px;border-radius:4px}
.sp-word-card{margin:0 1.25rem .875rem;background:var(--bg3);border-radius:var(--r2);padding:1.5rem 1.25rem;text-align:center;box-shadow:0 8px 28px rgba(91,79,240,.12)}
.spw-word{font-size:36px;font-weight:900;color:var(--ink);margin-bottom:.375rem}
.spw-ph{font-size:16px;color:var(--gold);font-style:italic;font-weight:800;margin-bottom:.375rem}
.spw-pos{font-size:11px;color:var(--ink3);font-weight:800;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.625rem}
.spw-cn{font-size:22px;font-weight:900;color:var(--p);margin-bottom:.5rem}
.spw-ex{font-size:13px;color:var(--ink3);font-style:italic;line-height:1.55}
.sp-btns{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin:0 1.25rem .875rem}
.sp-btn{padding:1.125rem;border-radius:var(--r2);font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:.5rem;border:none;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.12)}
.sp-listen{background:linear-gradient(135deg,var(--p),#8b5cf6);color:#fff}
.sp-rec{background:linear-gradient(135deg,var(--red),var(--pink));color:#fff}
.sp-rec.recording{animation:rec-glow 1s ease-in-out infinite}
@keyframes rec-glow{0%,100%{box-shadow:0 6px 20px rgba(239,35,60,.38)}50%{box-shadow:0 6px 30px rgba(239,35,60,.7),0 0 0 8px rgba(239,35,60,.12)}}
.sp-result{margin:0 1.25rem .875rem;background:var(--bg3);border-radius:var(--r2);padding:1rem;box-shadow:0 4px 16px rgba(91,79,240,.08)}
.sp-result-title{font-size:11px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem}
.sp-audio{width:100%;border-radius:var(--r);margin:.25rem 0}
.sp-tip{background:var(--p3);border-radius:var(--r);padding:.625rem .875rem;font-size:12.5px;color:var(--p);font-weight:600;line-height:1.5;margin-top:.5rem}
.sp-nav{display:flex;gap:.75rem;margin:0 1.25rem .875rem}
.sp-prev{flex:1;padding:.875rem;border-radius:var(--r2);background:var(--bg3);color:var(--ink2);font-size:14px;font-weight:800;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.06)}
.sp-next{flex:1;padding:.875rem;border-radius:var(--r2);background:linear-gradient(135deg,var(--green),var(--blue));color:#fff;font-size:14px;font-weight:800;border:none;cursor:pointer;box-shadow:0 6px 20px rgba(6,214,160,.32)}

/* ══════════════════════════════════════
   WORDS PAGE
══════════════════════════════════════ */
.words-header{background:linear-gradient(135deg,var(--orange),var(--pink));padding:1rem 1.25rem 1.25rem;border-radius:0 0 var(--r2) var(--r2);margin-bottom:.75rem;color:#fff}
.wh-title{font-size:20px;font-weight:900}
.wh-stats{display:flex;gap:.875rem;margin-top:.5rem}
.wh-s{font-size:13px;opacity:.9;font-weight:600}
.wh-s strong{font-weight:900;font-size:16px}
.tab-bar{display:flex;padding:.375rem;background:var(--bg3);border-radius:var(--r2);margin:0 1.25rem .75rem;gap:.375rem;box-shadow:0 3px 14px rgba(91,79,240,.1)}
.tb{flex:1;padding:.5rem;border-radius:var(--r);font-size:13px;font-weight:700;background:none;color:var(--ink3);cursor:pointer;border:none}
.tb.on{background:var(--p);color:#fff;box-shadow:0 4px 12px rgba(91,79,240,.28)}
.chips{display:flex;gap:.375rem;padding:0 1.25rem .625rem;overflow-x:auto}
.chip{flex-shrink:0;padding:.35rem .875rem;border-radius:20px;font-size:12px;font-weight:700;background:var(--bg3);color:var(--ink3);border:1.5px solid var(--bg);cursor:pointer;box-shadow:0 2px 8px rgba(91,79,240,.07)}
.chip.on{background:var(--p);color:#fff;border-color:var(--p)}
.sbar{margin:0 1.25rem .625rem;position:relative}
.sbar input{width:100%;padding:.625rem 1rem .625rem 2.5rem;border:2px solid var(--bg);border-radius:var(--r2);font-size:14px;background:var(--bg3);color:var(--ink);box-shadow:0 3px 12px rgba(91,79,240,.08)}
.sbar input:focus{border-color:var(--p)}
.sico{position:absolute;left:.875rem;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
.word-list{background:var(--bg3);border-radius:var(--r2);margin:0 1.25rem 1rem;overflow:hidden;box-shadow:0 4px 20px rgba(91,79,240,.1)}
.witem{padding:.875rem 1rem;border-bottom:1px solid var(--bg);display:flex;align-items:flex-start;gap:.75rem}
.witem:last-child{border-bottom:none}
.witem:active{background:var(--p4)}
.wi-body{flex:1;min-width:0}
.wi-en{font-size:15.5px;font-weight:900;color:var(--ink)}
.wi-ph{font-size:11.5px;color:var(--gold);font-style:italic;font-weight:700;margin-top:1px}
.wi-cn{font-size:13px;color:var(--ink2);margin-top:2px}
.wi-right{display:flex;flex-direction:column;align-items:flex-end;gap:.375rem;flex-shrink:0}
.wtag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700}
.wt-new{background:var(--blue3);color:var(--blue)}
.wt-lrn{background:var(--gold3);color:#c47800}
.wt-mas{background:var(--green3);color:var(--green)}
.wi-acts{display:flex;gap:.25rem}
.wi-a{padding:3px 8px;border-radius:8px;font-size:11.5px;font-weight:700;cursor:pointer;border:none}
.wi-master{background:var(--p3);color:var(--p)}
.wi-del{background:var(--red3);color:var(--red)}

/* ══════════════════════════════════════
   MY PAGE
══════════════════════════════════════ */
.my-header{background:linear-gradient(135deg,var(--p),var(--pink));padding:1.5rem 1.25rem 2.5rem;border-radius:0 0 var(--r3) var(--r3);margin-bottom:.75rem;text-align:center;color:#fff}
.my-avatar{width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.22);border:4px solid rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto .75rem;box-shadow:0 6px 20px rgba(0,0,0,.15)}
.my-name{font-size:22px;font-weight:900}
.my-lv{font-size:13px;opacity:.85;margin-top:.25rem;font-weight:700}
.my-score-row{display:flex;justify-content:center;gap:1rem;margin-top:.875rem}
.msr-item{text-align:center}
.msr-n{font-size:22px;font-weight:900}
.msr-l{font-size:11px;opacity:.8;font-weight:600}
.my-stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.625rem;margin:0 1.25rem 1rem}
.msc{background:var(--bg3);border-radius:var(--r2);padding:.875rem .5rem;text-align:center;box-shadow:0 4px 16px rgba(91,79,240,.1)}
.msc-n{font-size:24px;font-weight:900;color:var(--p)}
.msc-l{font-size:11px;color:var(--ink3);margin-top:2px;font-weight:700}
.my-section{margin:0 1.25rem 1rem}
.my-sec-t{font-size:11px;font-weight:900;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;padding:.75rem 0 .375rem}
.my-sec-body{background:var(--bg3);border-radius:var(--r2);overflow:hidden;box-shadow:0 4px 16px rgba(91,79,240,.1)}
.my-row{padding:.875rem 1rem;border-bottom:1px solid var(--bg);display:flex;align-items:center;justify-content:space-between;gap:.75rem;cursor:pointer}
.my-row:last-child{border-bottom:none}
.my-row:active{background:var(--p4)}
.mr-l{flex:1}
.mr-label{font-size:14px;font-weight:700;color:var(--ink)}
.mr-sub{font-size:12px;color:var(--ink3);margin-top:1px}
.mr-act{font-size:13.5px;font-weight:800;color:var(--p);background:none;border:none;cursor:pointer}
.mr-act-red{color:var(--red)}

/* Badges */
.badge-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;padding:.5rem 0}
.bdg-item{display:flex;flex-direction:column;align-items:center;gap:.375rem;cursor:pointer}
.bdg-ico{width:54px;height:54px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 4px 14px rgba(0,0,0,.1)}
.bdg-ico.locked{filter:grayscale(1);opacity:.35}
.bdg-name{font-size:10.5px;font-weight:700;color:var(--ink2);text-align:center;line-height:1.2}

/* AI panel */
.ai-panel{background:linear-gradient(135deg,var(--blue3),var(--p3));border-radius:var(--r);padding:.875rem;margin-bottom:.875rem;border:1px solid rgba(91,79,240,.15)}
.ai-panel-title{font-size:12.5px;font-weight:800;color:var(--p);margin-bottom:.5rem;display:flex;align-items:center;gap:.375rem}
.ai-panel input{width:100%;padding:.5rem .875rem;border:1.5px solid rgba(91,79,240,.2);border-radius:var(--r);font-size:12px;font-family:monospace;background:var(--bg3);color:var(--ink)}
.ai-status{font-size:13px;font-weight:700;color:var(--p);text-align:center;min-height:1.4rem;margin-bottom:.25rem}

/* Anims */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.84)}to{opacity:1;transform:scale(1)}}
.fu{animation:fadeUp .3s ease both}
.pi{animation:popIn .28s cubic-bezier(.34,1.56,.64,1) both}

.stag-my{background:var(--gold3);color:#b08000;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:800}
.stag-c4{background:var(--pink3);color:var(--pink);padding:2px 8px;border-radius:20px;font-size:10px;font-weight:800}
.stag-c6{background:var(--blue3);color:var(--blue);padding:2px 8px;border-radius:20px;font-size:10px;font-weight:800}

@media(min-width:430px){.app{border-left:1px solid rgba(91,79,240,.08);border-right:1px solid rgba(91,79,240,.08)}}
</style>
</head>
<body>
<div class="app">
  <div class="sb" id="sb">

    <div class="pg" id="pg-speaking"></div>
    <div class="pg" id="pg-words"></div>
    <div class="pg" id="pg-my"></div>
  </div>
  <nav class="bnav">

      <div class="nt-ico">🏠</div><span>首页</span>

      <div class="nt-ico">📚</div><span>词库</span>

</div>

<div class="reward-pop" id="reward-pop"></div>

<script>
// ═══════════════ DATA ═══════════════
const CET4_WORDS=[
  {word:"abandon",phonetic:"/əˈbændən/",pos:"动词",meaning:"放弃，遗弃",example:"He abandoned the project halfway.",level:"cet4"},
  {word:"ability",phonetic:"/əˈbɪlɪti/",pos:"名词",meaning:"能力，才能",example:"She has the ability to learn quickly.",level:"cet4"},
  {word:"academic",phonetic:"/ˌækəˈdemɪk/",pos:"形容词",meaning:"学术的",example:"Academic performance is important.",level:"cet4"},
  {word:"access",phonetic:"/ˈækses/",pos:"名词/动词",meaning:"进入，访问",example:"We need access to the internet.",level:"cet4"},
  {word:"achieve",phonetic:"/əˈtʃiːv/",pos:"动词",meaning:"实现，完成",example:"Hard work helps you achieve goals.",level:"cet4"},
  {word:"acknowledge",phonetic:"/əkˈnɒlɪdʒ/",pos:"动词",meaning:"承认，致谢",example:"He acknowledged his mistake.",level:"cet4"},
  {word:"adapt",phonetic:"/əˈdæpt/",pos:"动词",meaning:"适应，改编",example:"Animals adapt to their environment.",level:"cet4"},
  {word:"adequate",phonetic:"/ˈædɪkwət/",pos:"形容词",meaning:"足够的，适当的",example:"Make sure you get adequate sleep.",level:"cet4"},

// ══════════════ STORAGE ══════════════
function load(){try{const d=JSON.parse(localStorage.getItem('yt_v1')||'null');if(d)return d;}catch(e){}return init();}
function init(){
  const d={
    words:[...MY_DEFAULT],streak:0,lastDate:null,nextId:100,
    cfg:{},userName:'冒险者',score:0,coins:0,badges:[],
    energy:100,maxEnergy:100,
    weekTime:0,totalTime:0,
    currentDay:1,dayProgress:{},
    doneHistory:[]
  };
  save(d);return d;
}
function save(d){localStorage.setItem('yt_v1',JSON.stringify(d));}
function loadCfg(){const d=load();return{dsKey:d.cfg?.dsKey||localStorage.getItem('ds_key')||'',gistToken:localStorage.getItem('gist_token')||'',gistId:localStorage.getItem('gist_id')||'',claudeKey:localStorage.getItem('claude_key')||''};}
function saveCfg(cfg){if(cfg.dsKey!==undefined){localStorage.setItem('ds_key',cfg.dsKey);const d=load();d.cfg=d.cfg||{};d.cfg.dsKey=cfg.dsKey;save(d);}if(cfg.gistToken!==undefined)localStorage.setItem('gist_token',cfg.gistToken);if(cfg.gistId!==undefined)localStorage.setItem('gist_id',cfg.gistId);if(cfg.claudeKey!==undefined)localStorage.setItem('claude_key',cfg.claudeKey);}
function loadCetP(){try{return JSON.parse(localStorage.getItem('yt_cet')||'{}')}catch(e){return{}}}
function saveCetP(p){localStorage.setItem('yt_cet',JSON.stringify(p));}
function getCetW(id){const p=loadCetP();return p[id]||{status:'new',wrongCount:0,practiceCount:0};}
function setCetW(id,data){const p=loadCetP();p[id]={...getCetW(id),...data};saveCetP(p);}

// ══════════════ GAME MECHANICS ══════════════
function getLevel(score){let lv=LEVELS[0];for(const l of LEVELS){if(score>=l.min)lv=l;}return lv;}
function getNextLevel(score){const idx=LEVELS.findIndex(l=>score<l.min);return idx<0?null:LEVELS[idx];}
function addReward(xp,coins,msg){
  const d=load();
  d.score=(d.score||0)+xp;
  d.coins=(d.coins||0)+coins;
  checkBadges(d);save(d);
  showReward(xp,coins,msg);
}
function showReward(xp,coins,msg){
  const pop=document.getElementById('reward-pop');
  const bg=document.getElementById('rp-bg');
  if(!pop)return;
  pop.innerHTML=`
<span class="rp-emoji">${msg||'🎉'}</span>
<div class="rp-title">太棒了！</div>
<div class="rp-sub" style="display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;margin-bottom:1rem">
  ${xp?`<div class="stat-pill">⭐ +${xp} XP</div>`:''}
  ${coins?`<div class="stat-pill">🪙 +${coins} 金币</div>`:''}
</div>
<button class="btn btn-p btn-full" onclick="closeReward()" style="font-size:15px">继续冒险！</button>`;
  bg.style.display='block';
  pop.classList.add('show');
}
function closeReward(){
  document.getElementById('rp-bg').style.display='none';
  document.getElementById('reward-pop').classList.remove('show');
}
function checkBadges(d){
  const earned=d.badges||[];
  const checks=[
    {id:'first_word',cond:d.words.length>0},
    {id:'streak3',cond:(d.streak||0)>=3},
    {id:'streak7',cond:(d.streak||0)>=7},
    {id:'master10',cond:d.words.filter(w=>w.status==='mastered').length>=10},
    {id:'perfect',cond:d._lastPerfect},
    {id:'speaker',cond:d._speakerDone},
    {id:'dialogue',cond:d._dialogueDone},

async function callClaude(prompt,maxTokens=900){
  const key=loadCfg().claudeKey;if(!key)return null;
  const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:maxTokens,messages:[{role:'user',content:prompt}]})});
  if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err.error?.message||'API error '+res.status);}

let _ttsUnlocked=false;
function _unlockTTS(){if(_ttsUnlocked)return;_ttsUnlocked=true;const u=new SpeechSynthesisUtterance('');u.volume=0;window.speechSynthesis.speak(u);}
document.addEventListener('touchstart',_unlockTTS,{once:true});
document.addEventListener('click',_unlockTTS,{once:true});
function speak(word,cb){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const _do=()=>{
    const u=new SpeechSynthesisUtterance(word);
    u.lang='en-US';u.rate=0.8;u.volume=1;
    const b=document.querySelector('.speak-ring');if(b)b.classList.add('playing');
    u.onend=()=>{const b=document.querySelector('.speak-ring');if(b)b.classList.remove('playing');if(cb)cb();};
    u.onerror=()=>{const b=document.querySelector('.speak-ring');if(b)b.classList.remove('playing');};
    window.speechSynthesis.speak(u);
    // iOS Safari fix: kick the synth if it stalls
    setTimeout(()=>{if(window.speechSynthesis.paused)window.speechSynthesis.resume();},200);
  };
  if(!_ttsUnlocked){_unlockTTS();setTimeout(_do,150);}else{_do();}
}

function rechargeEnergy(d){
  const now=Date.now();
  if(!d.lastEnergyTime){d.lastEnergyTime=now;save(d);return;}
  const mins=Math.floor((now-d.lastEnergyTime)/60000);
  if(mins>=6){
    const gain=Math.floor(mins/6)*10;
    d.energy=Math.min(d.maxEnergy||100,(d.energy||0)+gain);

  }
}

function getAccent(){const m={my:'var(--p)',cet4:'var(--pink)',cet6:'var(--blue)',all:'var(--green)'};return m[practiceSource]||m.my;}
function getPool(mode){
  const d=load();let w=[];
  if(practiceSource==='my'||practiceSource==='all')w=[...w,...d.words.map(x=>({...x,_s:'my'}))];
  if(practiceSource==='cet4'||practiceSource==='all')w=[...w,...CET4_WORDS.map(x=>({...x,...getCetW(x.id),_s:'cet4'}))];
  if(practiceSource==='cet6'||practiceSource==='all')w=[...w,...CET6_WORDS.map(x=>({...x,...getCetW(x.id),_s:'cet6'}))];

function startGame(mode){
  if(mode==='reverse')mode='choice';
  const d=load();
  const energy=d.energy!==undefined?d.energy:100;
  if(energy<20){

function initTyped(){gs.typed=new Array(gs.queue[gs.idx].word.length).fill('');}

function nextReviewDate(interval){const d=new Date();d.setDate(d.getDate()+Math.round(interval));return d.toISOString().split('T')[0];}
function isDueToday(w){if(!w.nextReview)return false;return w.nextReview<=new Date().toISOString().split('T')[0];}
function getReviewWords(d){return d.words.filter(w=>isDueToday(w)&&w.status!=='mastered');}
function saveWP(w,ok){
  const d=load();
  if(w._s==='my'){
    const dw=d.words.find(x=>x.id===w.id);
    if(dw){
      dw.practiceCount=(dw.practiceCount||0)+1;
      if(ok){
        if(dw.practiceCount>=3)dw.status='mastered';
        else if(dw.status==='new')dw.status='learning';
        const interval=Math.max(1,(dw.reviewInterval||1)*2.5);
        dw.reviewInterval=interval;dw.nextReview=nextReviewDate(interval);
      }else{
        dw.wrongCount=(dw.wrongCount||0)+1;dw.status='learning';
        dw.reviewInterval=1;dw.nextReview=nextReviewDate(1);
      }
    }
  }else{
    const p=getCetW(w.id);p.practiceCount=(p.practiceCount||0)+1;
    if(ok){
      if(p.practiceCount>=3)p.status='mastered';
      else if(!p.status||p.status==='new')p.status='learning';
      const interval=Math.max(1,(p.reviewInterval||1)*2.5);
      p.reviewInterval=interval;p.nextReview=nextReviewDate(interval);
    }else{p.wrongCount=(p.wrongCount||0)+1;p.status='learning';p.reviewInterval=1;p.nextReview=nextReviewDate(1);}
    setCetW(w.id,p);
  }
  d.weekTime=(d.weekTime||0)+1;d.totalTime=(d.totalTime||0)+1;
  save(d);
}

  const act=g.checked?`<button class="next-btn" onclick="nextWord()">下一个 →</button>`:`<button class="${getABC()}"${fL===tL?'':' disabled'} onclick="checkSpell()">检查答案 ✓</button>`;
  document.getElementById('pi').innerHTML=`<div class="game-bg fu">
<div class="game-header">

</div>`;
}
function pressKey(k){
  if(gs.checked)return;
  const w=gs.queue[gs.idx].word;
  for(let i=0;i<w.length;i++){if(w[i]===' ')continue;if(!gs.typed[i]){gs.typed[i]=k;break;}}

}
function backspace(){
  if(gs.checked)return;
  const w=gs.queue[gs.idx].word;

function checkSpell(){

${fb}${act}
<button class="btn btn-ghost" style="margin:.25rem 1.25rem;width:calc(100% - 2.5rem)" onclick="gs={};drawPUI()">退出练习</button>
</div>`;
}
function selChoice(id){
  if(gs.checked)return;gs.checked=true;gs.cSel=id;

function spSpeak(word){if(!window.speechSynthesis)return;window.speechSynthesis.cancel();const _do=()=>{const u=new SpeechSynthesisUtterance(word);u.lang='en-US';u.rate=0.75;u.volume=1;window.speechSynthesis.speak(u);setTimeout(()=>{if(window.speechSynthesis.paused)window.speechSynthesis.resume();},200);};if(!_ttsUnlocked){_unlockTTS();setTimeout(_do,150);}else{_do();}toast('播放标准发音…');}

function ldist(a,b){const m=a.length,n=b.length;if(!m)return n;if(!n)return m;const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);return dp[m][n];}
function spSim(spoken,target){const t=target.toLowerCase(),words=spoken.toLowerCase().split(/\s+/);const best=words.reduce((acc,w)=>Math.max(acc,Math.round((1-ldist(w,t)/Math.max(w.length,t.length))*100)),0);return best;}

async function toggleRec(){
  const btn=document.getElementById('sp-rb');
  if(!spS.recording){
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      spS.transcript='';
      // 同步启动语音识别
      const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
      if(SR){
        spS.sr=new SR();spS.sr.lang='en-US';spS.sr.continuous=false;spS.sr.interimResults=false;
        spS.sr.onresult=e=>{spS.transcript=Array.from(e.results).map(r=>r[0].transcript).join(' ').trim();};
        spS.sr.onerror=()=>{};
        try{spS.sr.start();}catch(e){}
      }
      spS.mr=new MediaRecorder(stream);const chunks=[];
      spS.mr.ondataavailable=e=>chunks.push(e.data);
      spS.mr.onstop=()=>{spS.blob=new Blob(chunks,{type:'audio/webm'});stream.getTracks().forEach(t=>t.stop());setTimeout(showSpRes,400);};
      spS.mr.start();spS.recording=true;
      if(btn){btn.textContent='⏹ 停止录音';btn.classList.add('recording');}
    }catch(e){toast('无法访问麦克风，请检查权限');}

    try{spS.sr?.stop();}catch(e){}
    spS.recording=false;
    if(btn){btn.textContent='🎙️ 再次录音';btn.classList.remove('recording');}
  }
}

async function aiAutoFillAM(){
  const word=document.getElementById('am-w')?.value.trim();if(!word)return;
  const key=loadCfg().dsKey;if(!key)return;
  const st=document.getElementById('am-st');if(st)st.textContent='⏳ AI查询中…';
  try{
    const res=await fetch('https://api.deepseek.com/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:'deepseek-chat',max_tokens:200,temperature:0.3,messages:[{role:'user',content:'为英文单词"'+word+'"返回JSON（只返回JSON）：{"phonetic":"国际音标","pos":"词性中文","meaning":"中文释义","example":"英文例句"}'}]})});
    const data=await res.json();if(data.error){if(st)st.textContent='❌';return;}
    const j=JSON.parse(data.choices[0].message.content.trim().replace(/```json|```/g,'').trim());
    document.getElementById('am-p').value=j.phonetic||'';
    document.getElementById('am-pos').value=j.pos||'';
    document.getElementById('am-m').value=j.meaning||'';
    document.getElementById('am-e').value=j.example||'';
    if(st){st.textContent='✅ 补全成功！';setTimeout(()=>{st.textContent=''},2000);}
  }catch(e){if(st)st.textContent='❌ 失败';}
}
function addWordAM(){
  const word=document.getElementById('am-w')?.value.trim(),mean=document.getElementById('am-m')?.value.trim();
  if(!word||!mean){toast('请填写单词和释义');return;}
  const d=load();
  if(d.words.find(w=>w.word.toLowerCase()===word.toLowerCase())){toast('单词已存在！');return;}
  d.words.push({id:d.nextId++,word,phonetic:document.getElementById('am-p').value.trim(),pos:document.getElementById('am-pos').value.trim(),meaning:mean,example:document.getElementById('am-e').value.trim(),status:'new',wrongCount:0,practiceCount:0,addedAt:new Date().toISOString().split('T')[0],level:'my'});
  checkBadges(d);save(d);addReward(5,2,'📝');toast('✓ 已添加「'+word+'」');closeModal();gistPush();
}
async function amExtract(){
  const text=document.getElementById('am-txt')?.value.trim();if(!text){toast('请粘贴内容');return;}
  const key=loadCfg().dsKey;if(!key){toast('请填写API Key');return;}
  const btn=document.getElementById('am-ext'),st=document.getElementById('am-bst');
  btn.disabled=true;btn.textContent='⏳ 分析中…';
  try{
    const prompt='从以下英文提取5-15个有价值的单词（排除简单词），返回JSON数组（只返回JSON）：\\n[{"word":"","phonetic":"","pos":"","meaning":"","example":""}]\\n\\n文本：'+text;
    const res=await fetch('https://api.deepseek.com/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:'deepseek-chat',max_tokens:2000,temperature:0.3,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();if(data.error){toast('API错误');return;}
    const words=JSON.parse(data.choices[0].message.content.trim().replace(/```json|```/g,'').trim());
    const d=load(),ex=new Set(d.words.map(w=>w.word.toLowerCase()));
    batchList=words.map(w=>({...w,selected:!ex.has(w.word.toLowerCase()),exists:ex.has(w.word.toLowerCase())}));
    if(st)st.textContent='提取 '+words.length+' 个';
    renderAMBRes();
  }catch(e){toast('提取失败，检查API Key');}
  finally{btn.disabled=false;btn.textContent='🔍 AI提取';}
}
function renderAMBRes(){
  const sel=batchList.filter(w=>w.selected).length;
  const res=document.getElementById('am-bres');if(!res)return;
  res.innerHTML=`
<div style="display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;margin-bottom:.5rem">
  <span style="font-size:13.5px;color:var(--ink2);font-weight:700">已选 ${sel}/${batchList.length}</span>
  <div style="display:flex;gap:.375rem">
    <button class="btn btn-ghost btn-sm" onclick="bAll(true)">全选</button>
    <button class="btn btn-p btn-sm" onclick="bAdd()" ${sel===0?'disabled':''}>加入词库(${sel})</button>
  </div>
</div>
<div style="background:var(--bg3);border-radius:var(--r2);overflow:hidden;border:1.5px solid var(--bg);max-height:260px;overflow-y:auto">
${batchList.map((w,i)=>`<div style="padding:.75rem 1rem;border-bottom:1px solid var(--bg);display:flex;gap:.625rem;${w.selected?'background:#f8f6ff':''}${w.exists?';opacity:.4':''}" id="bi${i}">
  <input type="checkbox" ${w.selected?'checked':''} ${w.exists?'disabled':''} onchange="bTog(${i},this.checked)" style="width:18px;height:18px;flex-shrink:0;margin-top:2px;accent-color:var(--p)">
  <div style="flex:1;min-width:0">
    <div style="font-size:14px;font-weight:900;color:var(--ink)">${w.word} <span style="font-size:11px;color:var(--gold);font-style:italic;font-weight:700">${w.phonetic||''}</span></div>
    <div style="font-size:13px;color:var(--ink2);margin-top:2px">${w.meaning}</div>
  </div>
</div>`).join('')}
</div>`;
}
function bTog(i,c){batchList[i].selected=c;const el=document.getElementById('bi'+i);if(el)el.style.background=c?'#f8f6ff':'';const sel=batchList.filter(w=>w.selected).length;const btn=document.querySelector('#am-bres .btn-p');if(btn){btn.textContent='加入词库('+sel+')';btn.disabled=sel===0;}}
function bAll(s){batchList.forEach((w,i)=>{if(!w.exists){w.selected=s;const el=document.getElementById('bi'+i);if(el)el.style.background=s?'#f8f6ff':'';}});renderAMBRes();}
function bAdd(){
  const toAdd=batchList.filter(w=>w.selected&&!w.exists);if(!toAdd.length)return;
  const d=load();
  toAdd.forEach(w=>{d.words.push({id:d.nextId++,word:w.word,phonetic:w.phonetic||'',pos:w.pos||'',meaning:w.meaning,example:w.example||'',status:'new',wrongCount:0,practiceCount:0,addedAt:new Date().toISOString().split('T')[0],level:'my'});});
  checkBadges(d);save(d);addReward(toAdd.length*5,toAdd.length*2,'📚');toast('✓ 添加 '+toAdd.length+' 个！');gistPush();
  toAdd.forEach(w=>{const bw=batchList.find(b=>b.word===w.word);if(bw){bw.exists=true;bw.selected=false;}});
  renderAMBRes();
}

  <div style="font-size:12px;color:var(--ink3);margin-bottom:.875rem">需要 GitHub 账号 → <a href="https://github.com/settings/tokens/new?scopes=gist" target="_blank" style="color:var(--p);font-weight:700">生成 Token</a>（勾选 gist）</div>
  <div style="display:flex;gap:.625rem">
    <button class="btn btn-p" style="flex:1" onclick="saveToken()">保存并同步</button>
    <button class="btn btn-ghost" onclick="closeModal()">取消</button>
  </div>
</div></div>`;
}
function showClaudeModal(){
  const{claudeKey:k}=loadCfg();
  document.getElementById('modal').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()">
<div class="modal-sheet">
  <div class="modal-drag"></div>
  <div class="modal-title">🤖 Claude API Key</div>
  <div style="background:var(--p3);border-radius:var(--r);padding:.75rem 1rem;margin-bottom:.875rem;border:1px solid rgba(91,79,240,.15)">
    <div style="font-size:12.5px;font-weight:700;color:var(--p);line-height:1.5">配置后解锁：<br>✦ AI根据你的生词库实时生成对话场景<br>✦ 对话中出现的词一键加入生词本<br>✦ 每次练习内容不重复，真正活起来</div>
  </div>
  <div class="field" style="margin-bottom:.375rem"><label class="flabel">API Key</label><input class="finp" id="m-claude" type="password" placeholder="sk-ant-xxxxxxxx" value="${k}" style="font-family:monospace;font-size:13px"></div>
  <div style="font-size:12px;color:var(--ink3);margin-bottom:.875rem">Key 仅存于本机，不上传任何服务器</div>
  <div style="display:flex;gap:.625rem">
    <button class="btn btn-p" style="flex:1" onclick="saveClaude()">保存</button>
    <button class="btn btn-ghost" onclick="closeModal()">取消</button>
  </div>
</div></div>`;
}
function saveClaude(){const k=document.getElementById('m-claude')?.value.trim();saveCfg({claudeKey:k});closeModal();toast(k?'✅ Claude Key 已保存，AI对话已启用':'已清除 Claude Key');renderMy(load());}

function showDsModal(){
  const{dsKey:k}=loadCfg();
  document.getElementById('modal').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()">
<div class="modal-sheet">
  <div class="modal-drag"></div>
  <div class="modal-title">🤖 DeepSeek Key</div>
  <div class="field" style="margin-bottom:.375rem"><input class="finp" id="m-ds" type="password" placeholder="sk-xxxxxxxx" value="${k}" style="font-family:monospace;font-size:13px"></div>
  <div style="font-size:12px;color:var(--ink3);margin-bottom:.875rem">Key仅存本机，不上传</div>
  <div style="display:flex;gap:.625rem">
    <button class="btn btn-p" style="flex:1" onclick="saveDs()">保存</button>
    <button class="btn btn-ghost" onclick="closeModal()">取消</button>
  </div>
</div></div>`;
}
async function saveToken(){const t=document.getElementById('m-tok')?.value.trim();if(!t){toast('请填写Token');return;}const g=document.getElementById('m-gist');saveCfg({gistToken:t,gistId:g?.value.trim()||''});closeModal();toast('⏳ 同步中…');await gistSync();renderMy(load());toast(syncState==='ok'?'☁️ 同步成功！':'⚠️ 同步失败');}
function saveDs(){const k=document.getElementById('m-ds')?.value.trim();saveCfg({dsKey:k});gistPush();closeModal();toast('✓ 已保存');renderMy(load());}
function exportData(){const d=load();const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='yingtu_'+new Date().toISOString().split('T')[0]+'.json';a.click();}
function importData(){const i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{save(JSON.parse(ev.target.result));location.reload();}catch(e){toast('格式错误');}};r.readAsText(f);};i.click();}
function resetData(){if(confirm('确定重置所有数据？此操作不可撤销！')){localStorage.removeItem('yt_v1');localStorage.removeItem('yt_cet');location.reload();}}

// ══════════════ KEYBOARD ══════════════
document.addEventListener('keydown',e=>{
  if(page!=='practice'||!gs.mode||gs.mode==='choice')return;
  if(e.key==='Backspace'){e.preventDefault();backspace();return;}
  if(e.key==='Enter'){if(!gs.checked){const b=document.querySelector('.ans-btn');if(b&&!b.disabled)checkSpell();}else nextWord();return;}
  if(/^[a-zA-Z]$/.test(e.key))pressKey(e.key.toLowerCase());
});

render();
setTimeout(async()=>{await gistSync();render();},1000);

</script>
</body>
</html>
