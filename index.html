<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>词境</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f2f1ec;--bg2:#faf9f6;--bg3:#eceae3;
  --ink:#18181b;--ink2:#3f3f46;--ink3:#71717a;--ink4:#a1a1aa;
  --line:#e4e4e7;--line2:#d4d4d8;
  --primary:#dc4f1e;--primary-light:#fff1ed;--primary-dark:#b83d14;
  --cet4:#be185d;--cet4-light:#fdf2f8;
  --cet6:#6d28d9;--cet6-light:#f5f3ff;
  --success:#15803d;--success-light:#f0fdf4;
  --warning:#b45309;--warning-light:#fffbeb;
  --info:#1d4ed8;--info-light:#eff6ff;
  --r:10px;--r2:16px;--r3:20px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --nav-h:64px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.06);
  --shadow:0 2px 8px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 8px 24px rgba(0,0,0,.12),0 2px 6px rgba(0,0,0,.06);
}

html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--ink);font-family:'DM Sans',system-ui,sans-serif;font-size:15px;line-height:1.6;overscroll-behavior:none}

/* App shell */
.app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;position:relative;background:var(--bg)}
.app-body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 16px)}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:calc(var(--nav-h) + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:rgba(250,249,246,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:0.5px solid var(--line);display:flex;align-items:flex-start;z-index:100}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:.75rem .25rem .5rem;gap:4px;cursor:pointer;border:none;background:none;color:var(--ink4);transition:color .2s;font-size:10px;font-family:'DM Sans',sans-serif;font-weight:500;letter-spacing:.02em}
.nav-tab.active{color:var(--primary)}
.nav-tab svg{width:22px;height:22px;transition:transform .2s}
.nav-tab.active svg{transform:scale(1.1)}
.nav-tab-label{font-size:10px;margin-top:1px}

/* Pages */
.page{display:none;padding:0}
.page.active{display:block}

/* Page header */
.ph{padding:1.25rem 1.25rem .75rem;display:flex;align-items:center;justify-content:space-between}
.ph-title{font-family:'Noto Serif SC',serif;font-size:22px;font-weight:700;letter-spacing:.02em}
.ph-sub{font-size:12px;color:var(--ink4);margin-top:1px;font-family:'DM Sans',sans-serif}
.ph-action{background:none;border:none;color:var(--ink3);font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;padding:.25rem .5rem;border-radius:var(--r)}

/* Cards */
.card{background:var(--bg2);border-radius:var(--r2);padding:1.125rem;margin:0 1rem 1rem;box-shadow:var(--shadow-sm);border:0.5px solid var(--line)}
.card-flush{background:var(--bg2);border-radius:var(--r2);overflow:hidden;margin:0 1rem 1rem;box-shadow:var(--shadow-sm);border:0.5px solid var(--line)}

/* Hero card on home */
.hero{margin:0 1rem 1rem;border-radius:var(--r3);padding:1.5rem;background:linear-gradient(135deg,var(--primary) 0%,#f97316 100%);color:#fff;position:relative;overflow:hidden;box-shadow:var(--shadow-lg)}
.hero::before{content:'';position:absolute;top:-30px;right:-30px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.1)}
.hero::after{content:'';position:absolute;bottom:-40px;right:20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.07)}
.hero-label{font-size:11px;opacity:.8;text-transform:uppercase;letter-spacing:.1em;font-weight:600;margin-bottom:.5rem}
.hero-num{font-family:'DM Serif Display',serif;font-size:52px;line-height:1;margin-bottom:.25rem}
.hero-sub{font-size:13px;opacity:.85}
.hero-streak{position:absolute;top:1.25rem;right:1.25rem;background:rgba(255,255,255,.2);border-radius:20px;padding:.35rem .75rem;font-size:12px;font-weight:600;backdrop-filter:blur(10px)}

/* Stats row */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin:0 1rem 1rem}
.stat-box{background:var(--bg2);border-radius:var(--r2);padding:.875rem;text-align:center;border:0.5px solid var(--line)}
.stat-n{font-size:22px;font-weight:700;font-family:'DM Serif Display',serif}
.stat-l{font-size:11px;color:var(--ink4);margin-top:2px;font-weight:500}

/* Progress bars */
.prog-item{margin:0 1rem .75rem}
.prog-head{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:6px;color:var(--ink2);font-weight:500}
.prog-track{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.34,1.56,.64,1)}

/* Section label */
.section-label{padding:.75rem 1.25rem .375rem;font-size:11px;color:var(--ink4);text-transform:uppercase;letter-spacing:.08em;font-weight:600}

/* Quick actions */
.quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin:0 1rem 1rem}
.qa-btn{border:none;border-radius:var(--r2);padding:1rem;display:flex;flex-direction:column;align-items:flex-start;gap:.5rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:transform .15s,box-shadow .15s;text-align:left}
.qa-btn:active{transform:scale(.97)}
.qa-btn .qa-icon{font-size:22px}
.qa-btn .qa-label{font-size:14px;font-weight:600;color:#fff}
.qa-btn .qa-sub{font-size:11px;opacity:.8;color:#fff}
.qa-practice{background:linear-gradient(135deg,var(--primary),#f97316)}
.qa-batch{background:linear-gradient(135deg,var(--info),#0ea5e9)}
.qa-cet4{background:linear-gradient(135deg,var(--cet4),#ec4899)}
.qa-cet6{background:linear-gradient(135deg,var(--cet6),#8b5cf6)}

/* Notice banner */
.banner{margin:0 1rem .75rem;padding:.75rem 1rem;border-radius:var(--r);font-size:13px;display:flex;align-items:center;gap:.5rem;font-weight:500}
.banner-warn{background:var(--warning-light);color:var(--warning)}
.banner-ok{background:var(--success-light);color:var(--success)}
.banner-info{background:var(--info-light);color:var(--info)}

/* Practice page */
.source-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin:0 1rem 1rem}
.src-card{border:2px solid var(--line);border-radius:var(--r2);padding:1rem;cursor:pointer;transition:all .2s;background:var(--bg2);text-align:center}
.src-card:active{transform:scale(.97)}
.src-card.sel-my{border-color:var(--primary);background:var(--primary-light)}
.src-card.sel-cet4{border-color:var(--cet4);background:var(--cet4-light)}
.src-card.sel-cet6{border-color:var(--cet6);background:var(--cet6-light)}
.src-card.sel-all{border-color:var(--info);background:var(--info-light)}
.src-icon{font-size:28px;margin-bottom:.375rem}
.src-name{font-size:13px;font-weight:600}
.src-cnt{font-size:11px;color:var(--ink4);margin-top:2px}

.mode-pills{display:flex;gap:.5rem;margin:0 1rem 1rem;overflow-x:auto;padding-bottom:2px}
.mode-pill{flex-shrink:0;padding:.5rem 1rem;border-radius:20px;border:1.5px solid var(--line2);font-size:13px;font-weight:600;cursor:pointer;background:var(--bg2);color:var(--ink3);transition:all .2s;font-family:'DM Sans',sans-serif}
.mode-pill.on-my{background:var(--primary);color:#fff;border-color:var(--primary)}
.mode-pill.on-cet4{background:var(--cet4);color:#fff;border-color:var(--cet4)}
.mode-pill.on-cet6{background:var(--cet6);color:#fff;border-color:var(--cet6)}
.mode-pill.on-all{background:var(--info);color:#fff;border-color:var(--info)}

/* Game area */
.game-area{padding:0 1rem}
.hearts-row{display:flex;gap:6px;margin-bottom:1rem}
.h-icon{width:22px;height:22px}
.speak-circle{width:80px;height:80px;border-radius:50%;border:2px solid var(--line2);background:var(--bg2);display:flex;align-items:center;justify-content:center;margin:.5rem auto 1rem;cursor:pointer;transition:all .2s;box-shadow:var(--shadow)}
.speak-circle:active{transform:scale(.93)}
.speak-circle.playing{border-color:var(--primary);background:var(--primary-light);box-shadow:0 0 0 6px rgba(220,79,30,.15)}
.speak-circle svg{width:34px;height:34px;fill:var(--ink3)}
.speak-circle.playing svg{fill:var(--primary)}
.meaning-pill{background:var(--bg3);border-radius:var(--r2);padding:.875rem 1rem;margin-bottom:1rem;text-align:center}
.mp-pos{font-size:10px;color:var(--ink4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;font-weight:600}
.mp-cn{font-size:17px;font-weight:600;font-family:'Noto Serif SC',serif}
.mp-ex{font-size:12.5px;color:var(--ink3);margin-top:4px;font-style:italic}
.slots-row{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-bottom:1rem;min-height:50px;align-items:center}
.slot{width:36px;height:46px;border-bottom:2.5px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:700;transition:border-color .15s;text-transform:lowercase;font-family:'DM Serif Display',serif}
.slot.active{border-color:var(--primary)}
.slot.space{border-bottom-color:transparent;width:14px}
.slot.correct{border-color:var(--success);color:var(--success)}
.slot.wrong{border-color:var(--primary);color:var(--primary)}
.kbd-wrap{display:flex;flex-direction:column;gap:5px;margin-bottom:1rem}
.krow{display:flex;gap:4px;justify-content:center}
.key{min-width:32px;height:42px;padding:0 4px;border:1px solid var(--line2);border-radius:8px;background:var(--bg2);font-size:15px;font-weight:600;cursor:pointer;color:var(--ink);transition:background .1s;box-shadow:0 1px 0 var(--line2)}
.key:active{background:var(--bg3);transform:translateY(1px);box-shadow:none}
.key.bs{min-width:48px;font-size:12px;font-family:'DM Sans',sans-serif}
.check-btn{width:100%;padding:14px;border:none;color:#fff;font-size:15px;font-weight:600;border-radius:var(--r2);cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .15s}
.check-btn:disabled{opacity:.3;cursor:default}
.cb-my{background:var(--primary)}.cb-cet4{background:var(--cet4)}.cb-cet6{background:var(--cet6)}.cb-all{background:var(--info)}
.fb{border-radius:var(--r);padding:.75rem 1rem;margin-bottom:1rem;font-size:14px;font-weight:600;text-align:center;font-family:'Noto Serif SC',serif}
.fb-ok{background:var(--success-light);color:var(--success)}
.fb-fail{background:var(--primary-light);color:var(--primary)}
.next-btn{width:100%;padding:14px;border:1.5px solid var(--line2);background:var(--bg2);color:var(--ink);font-size:15px;font-weight:600;border-radius:var(--r2);cursor:pointer;font-family:'DM Sans',sans-serif}
.next-btn:active{background:var(--bg3)}
.choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:.625rem;margin-bottom:1rem}
.ch-btn{padding:14px 12px;border:1.5px solid var(--line2);border-radius:var(--r);background:var(--bg2);font-size:13.5px;cursor:pointer;text-align:left;transition:all .15s;font-family:'Noto Serif SC',serif;line-height:1.4}
.ch-btn:active{background:var(--bg3)}
.ch-btn.ok{background:var(--success-light);border-color:var(--success);color:var(--success)}
.ch-btn.fail{background:var(--primary-light);border-color:var(--primary);color:var(--primary)}
.ch-btn.show{background:var(--success-light);border-color:var(--success);color:var(--success)}

/* Finish */
.finish-card{margin:1rem;border-radius:var(--r3);padding:2rem;text-align:center;background:var(--bg2);border:0.5px solid var(--line)}
.finish-emoji{font-size:48px;margin-bottom:1rem;display:block}
.finish-title{font-family:'DM Serif Display',serif;font-size:26px;margin-bottom:.25rem}
.finish-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin:1.25rem 0}
.fs{background:var(--bg3);border-radius:var(--r);padding:.875rem;text-align:center}
.fs-n{font-size:22px;font-weight:700;font-family:'DM Serif Display',serif}
.fs-l{font-size:11px;color:var(--ink4);margin-top:2px}

/* Wordbook */
.word-row{padding:1rem 1.25rem;border-bottom:0.5px solid var(--line);display:flex;align-items:center;gap:.875rem;background:var(--bg2)}
.word-row:last-child{border-bottom:none}
.wr-body{flex:1;min-width:0}
.wr-en{font-size:15px;font-weight:600;font-family:'DM Serif Display',serif}
.wr-ph{font-size:12px;color:var(--warning);font-style:italic;margin-top:1px}
.wr-cn{font-size:13px;color:var(--ink2);margin-top:2px}
.wr-right{display:flex;flex-direction:column;align-items:flex-end;gap:.375rem;flex-shrink:0}

/* Badges */
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif}
.b-new{background:var(--info-light);color:var(--info)}
.b-learning{background:var(--warning-light);color:var(--warning)}
.b-mastered{background:var(--success-light);color:var(--success)}
.b-weak{background:var(--primary-light);color:var(--primary)}
.b-cet4{background:var(--cet4-light);color:var(--cet4)}
.b-cet6{background:var(--cet6-light);color:var(--cet6)}

/* Filter chips */
.chips{display:flex;gap:.5rem;padding:.5rem 1rem;overflow-x:auto;-webkit-overflow-scrolling:touch}
.chip{flex-shrink:0;padding:5px 13px;border:1.5px solid var(--line2);border-radius:20px;font-size:12.5px;background:var(--bg2);cursor:pointer;color:var(--ink3);font-weight:500;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .15s}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}

/* Search bar */
.search-bar{margin:.5rem 1rem .75rem;position:relative}
.search-bar input{width:100%;padding:.75rem 1rem .75rem 2.5rem;border:1.5px solid var(--line2);border-radius:var(--r2);font-size:14px;background:var(--bg2);color:var(--ink);outline:none;font-family:'DM Sans',sans-serif}
.search-bar input:focus{border-color:var(--primary)}
.search-icon{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:var(--ink4);pointer-events:none}

/* Add form */
.form-section{margin:0 1rem 1rem}
.field{margin-bottom:.875rem}
.label{font-size:12px;color:var(--ink3);margin-bottom:5px;display:block;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.inp{width:100%;padding:.75rem 1rem;border:1.5px solid var(--line2);border-radius:var(--r);font-size:14.5px;background:var(--bg2);color:var(--ink);outline:none;transition:border-color .15s;font-family:'DM Sans',sans-serif;-webkit-appearance:none}
.inp:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(220,79,30,.1)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
textarea.inp{resize:none;min-height:100px;line-height:1.6}

/* Buttons */
.btn{padding:.75rem 1.25rem;font-size:14px;font-weight:600;border-radius:var(--r2);cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:.375rem}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-blue{background:var(--info);color:#fff}
.btn-ghost{background:var(--bg3);color:var(--ink2);border:1px solid var(--line2)}
.btn-sm{padding:.5rem .875rem;font-size:12.5px;border-radius:var(--r)}
.btn-danger{background:var(--primary-light);color:var(--primary)}
.btn-full{width:100%}

/* AI status bar */
.ai-bar{background:var(--info-light);border-radius:var(--r);padding:.75rem 1rem;margin-bottom:.875rem;border:1px solid #bfdbfe}
.ai-bar-title{font-size:12.5px;font-weight:600;color:var(--info);margin-bottom:.5rem;display:flex;align-items:center;gap:.375rem}
.ai-bar input{width:100%;padding:.625rem .875rem;border:1px solid #bfdbfe;border-radius:var(--r);font-size:12.5px;background:#fff;color:var(--ink);outline:none;font-family:monospace}
.ai-bar input:focus{border-color:var(--info)}

/* Batch import */
.batch-item{padding:.875rem 1rem;border-bottom:0.5px solid var(--line);display:flex;gap:.75rem;align-items:flex-start;background:var(--bg2)}
.batch-item:last-child{border-bottom:none}
.batch-item.sel{background:#fff9f7}
.batch-item.exists{opacity:.45}
.batch-check{width:20px;height:20px;flex-shrink:0;margin-top:2px;cursor:pointer;accent-color:var(--primary)}
.bi-en{font-size:15px;font-weight:600;font-family:'DM Serif Display',serif}
.bi-ph{font-size:12px;color:var(--warning);font-style:italic}
.bi-cn{font-size:13px;color:var(--ink2);margin-top:3px}
.bi-ex{font-size:12px;color:var(--ink4);font-style:italic;margin-top:2px}

/* Settings */
.settings-group{margin:0 1rem 1rem}
.sg-header{font-size:11px;color:var(--ink4);text-transform:uppercase;letter-spacing:.07em;font-weight:600;padding:.75rem 0 .375rem}
.sg-body{background:var(--bg2);border-radius:var(--r2);overflow:hidden;border:0.5px solid var(--line)}
.sg-row{padding:.875rem 1rem;border-bottom:0.5px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:.75rem}
.sg-row:last-child{border-bottom:none}
.sg-label{font-size:14px;font-weight:500}
.sg-sub{font-size:12px;color:var(--ink4);margin-top:1px}
.sg-action{color:var(--primary);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}

/* Toast */
.toast{position:fixed;top:1rem;left:50%;transform:translateX(-50%) translateY(-80px);background:rgba(24,24,27,.92);color:#fff;padding:.75rem 1.25rem;border-radius:var(--r2);font-size:13.5px;font-weight:500;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);font-family:'DM Sans',sans-serif;white-space:nowrap;backdrop-filter:blur(10px)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Source tag */
.src-tag{display:inline-block;padding:1px 7px;border-radius:3px;font-size:10px;font-weight:700;font-family:'DM Sans',sans-serif}
.st-my{background:var(--warning-light);color:var(--warning)}
.st-cet4{background:var(--cet4-light);color:var(--cet4)}
.st-cet6{background:var(--cet6-light);color:var(--cet6)}

/* loading */
.loading{text-align:center;padding:3rem 1rem;color:var(--ink4);font-size:14px}
.spinner{width:32px;height:32px;border:3px solid var(--line2);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .3s ease both}

/* Desktop layout */
@media(min-width:480px){
  .app{border-left:0.5px solid var(--line);border-right:0.5px solid var(--line);box-shadow:0 0 40px rgba(0,0,0,.06)}
  .bottom-nav{border-radius:0 0 var(--r2) var(--r2)}
}

/* Scrollbar */
::-webkit-scrollbar{width:0;height:0}
</style>
</head>
<body>
<div class="app">
  <div class="app-body" id="app-body">
    <!-- Pages rendered here -->
    <div class="page active" id="pg-home"></div>
    <div class="page" id="pg-practice"></div>
    <div class="page" id="pg-words"></div>
    <div class="page" id="pg-add"></div>
    <div class="page" id="pg-settings"></div>
  </div>
  <nav class="bottom-nav">
    <button class="nav-tab active" id="nt-home" onclick="go('home')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span class="nav-tab-label">首页</span>
    </button>
    <button class="nav-tab" id="nt-practice" onclick="go('practice')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
      <span class="nav-tab-label">练习</span>
    </button>

// STORAGE
// ═══════════════════════════════════════
function load(){
  try{const d=JSON.parse(localStorage.getItem('ciJing_v3')||'null');if(d)return d;}catch(e){}
  return init();
}
function init(){
  const d={words:[...MY_DEFAULT],streak:0,lastDate:null,nextId:100,cfg:{}};
  save(d);return d;
}
function save(d){localStorage.setItem('ciJing_v3',JSON.stringify(d));}
function loadCfg(){
  const d=load();
  return{
    dsKey:d.cfg?.dsKey||localStorage.getItem('ds_key')||'',
    gistToken:localStorage.getItem('gist_token')||'',
    gistId:localStorage.getItem('gist_id')||''
  };
}
function saveCfg(cfg){
  if(cfg.dsKey!==undefined){localStorage.setItem('ds_key',cfg.dsKey);const d=load();d.cfg=d.cfg||{};d.cfg.dsKey=cfg.dsKey;save(d);}
  if(cfg.gistToken!==undefined)localStorage.setItem('gist_token',cfg.gistToken);
  if(cfg.gistId!==undefined)localStorage.setItem('gist_id',cfg.gistId);
}

// CET progress stored separately
function loadCetProgress(){
  try{return JSON.parse(localStorage.getItem('ciJing_cet')||'{}')}catch(e){return{}}
}
function saveCetProgress(p){localStorage.setItem('ciJing_cet',JSON.stringify(p));}
function getCetWord(id){
  const p=loadCetProgress();

}
function setCetWord(id,data){

}

// GIST SYNC
// ═══════════════════════════════════════
const GIST_FILE='cijing_vocab.json';
let syncState='idle';
function getGistCfg(){return{token:localStorage.getItem('gist_token')||'',gistId:localStorage.getItem('gist_id')||''};}
async function gistSync(){
  const{token,gistId}=getGistCfg();if(!token)return;
  setSyncState('syncing');
  try{
    if(!gistId)await gistCreate(token);
    else await gistPull(token,gistId);
    setSyncState('ok');
  }catch(e){setSyncState('err');console.error(e);}
}
async function gistPush(){
  const{token,gistId}=getGistCfg();if(!token||!gistId)return;
  setSyncState('syncing');
  try{
    const d=load();
    await fetch(`https://api.github.com/gists/${gistId}`,{method:'PATCH',headers:{'Authorization':'token '+token,'Content-Type':'application/json'},body:JSON.stringify({files:{[GIST_FILE]:{content:JSON.stringify(d)}}})});
    setSyncState('ok');
  }catch(e){setSyncState('err');}
}
async function gistPull(token,gistId){
  const res=await fetch(`https://api.github.com/gists/${gistId}`,{headers:{'Authorization':'token '+token}});
  if(!res.ok)throw new Error('Pull failed');
  const data=await res.json();
  const content=data.files[GIST_FILE]?.content;
  if(content){
    const remote=JSON.parse(content);
    const local=load();
    const remoteIds=new Set(remote.words.map(w=>w.id));
    const localOnly=local.words.filter(w=>!remoteIds.has(w.id));
    remote.words=[...remote.words,...localOnly];
    remote.nextId=Math.max(remote.nextId||0,...remote.words.map(w=>w.id+1));
    save(remote);
    if(remote.cfg?.dsKey)localStorage.setItem('ds_key',remote.cfg.dsKey);
  }
}
async function gistCreate(token){
  const d=load();
  const res=await fetch('https://api.github.com/gists',{method:'POST',headers:{'Authorization':'token '+token,'Content-Type':'application/json'},body:JSON.stringify({description:'词境生词本',public:false,files:{[GIST_FILE]:{content:JSON.stringify(d)}}})});
  if(!res.ok)throw new Error('Create failed');
  const data=await res.json();
  localStorage.setItem('gist_id',data.id);
  toast('☁️ 云端备份已创建！');
}
function setSyncState(s){
  syncState=s;
  const dot=document.getElementById('sync-dot');
  if(dot){dot.className='sync-dot '+(s==='ok'?'sync-ok':'sync-pending');dot.title=s==='ok'?'已同步':'同步中…';}
}

let _tt;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2400);}
function speak(word){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(word);u.lang='en-US';u.rate=0.85;
  const b=document.querySelector('.speak-btn');if(b)b.classList.add('playing');
  u.onend=()=>{const b=document.querySelector('.speak-btn');if(b)b.classList.remove('playing');};
  window.speechSynthesis.speak(u);
}
function checkStreak(d){
  const today=new Date().toDateString();if(d.lastDate===today)return;
  const yest=new Date(Date.now()-86400000).toDateString();
  d.streak=d.lastDate===yest?(d.streak||0)+1:1;d.lastDate=today;save(d);
}

function render(){
  const d=load();checkStreak(d);
  const st=document.getElementById('streak-txt');if(st)st.textContent=`连续 ${d.streak||0} 天`;
  const sc=document.getElementById('word-count-sub');if(sc)sc.textContent=`我的 ${d.words.length} 个 · 四六级 ${CET4_WORDS.length+CET6_WORDS.length} 个`;
  const b=document.getElementById('body');
  if(page==='home')b.innerHTML=renderHome(d);
  else if(page==='practice'){b.innerHTML=renderPracticeShell();drawSourceSelector();}
  else if(page==='words')b.innerHTML=renderWords(d);
  else if(page==='cet')b.innerHTML=renderCet();
  else if(page==='mistakes')b.innerHTML=renderMistakes(d);
  else if(page==='add')b.innerHTML=renderAdd();
  else if(page==='batch')b.innerHTML=renderBatch();
  else if(page==='settings')b.innerHTML=renderSettings();
}

  const learning=d.words.filter(w=>w.status==='learning').length,newW=d.words.filter(w=>w.status==='new').length;

// PRACTICE - SOURCE SELECTOR
// ═══════════════════════════════════════
let gs={};
let practiceSource='my'; // my | cet4 | cet6 | all

function renderPracticeShell(){
  return`<div class="page-title">开始练习</div><div id="practice-body"></div>`;}

function drawSourceSelector(){
  const d=load();
  const cp=loadCetProgress();
  const myCnt=d.words.length;
  const cet4Cnt=CET4_WORDS.length;
  const cet6Cnt=CET6_WORDS.length;
  document.getElementById('practice-body').innerHTML=`
<div class="source-selector">
  <div class="source-card${practiceSource==='my'?' selected-my':''}" onclick="selectSource('my')">
    <div class="source-icon">📖</div>
    <div class="source-label">我的生词</div>
    <div class="source-count">${myCnt} 个单词</div>
  </div>
  <div class="source-card${practiceSource==='cet4'?' selected-cet4':''}" onclick="selectSource('cet4')">
    <div class="source-icon">🎯</div>
    <div class="source-label">四级词库</div>
    <div class="source-count">${cet4Cnt} 个单词</div>
  </div>
  <div class="source-card${practiceSource==='cet6'?' selected-cet6':''}" onclick="selectSource('cet6')">
    <div class="source-icon">🏆</div>
    <div class="source-label">六级词库</div>
    <div class="source-count">${cet6Cnt} 个单词</div>
  </div>
  <div class="source-card${practiceSource==='all'?' selected-all':''}" onclick="selectSource('all')">
    <div class="source-icon">⚡</div>
    <div class="source-label">全部混合</div>
    <div class="source-count">${myCnt+cet4Cnt+cet6Cnt} 个单词</div>
  </div>
</div>
<div class="tabs">
  <button class="tab${gs.mode==='spell'||!gs.mode?' on-'+practiceSource:''}" onclick="startGame('spell')">听写拼写</button>
  <button class="tab${gs.mode==='choice'?' on-'+practiceSource:''}" onclick="startGame('choice')">选择题</button>
  <button class="tab${gs.mode==='mistakes'?' on-'+practiceSource:''}" onclick="startGame('mistakes')">练错题</button>
</div>
<div id="gc"></div>`;}

function selectSource(src){
  practiceSource=src;
  gs={};
  drawSourceSelector();
}

function getPool(mode){
  const d=load();
  const cp=loadCetProgress();
  let words=[];
  if(practiceSource==='my'||practiceSource==='all'){
    words=[...words,...d.words.map(w=>({...w,_src:'my'}))];
  }
  if(practiceSource==='cet4'||practiceSource==='all'){
    words=[...words,...CET4_WORDS.map(w=>({...w,...getCetWord(w.id),_src:'cet4'}))];
  }
  if(practiceSource==='cet6'||practiceSource==='all'){
    words=[...words,...CET6_WORDS.map(w=>({...w,...getCetWord(w.id),_src:'cet6'}))];
  }
  if(mode==='mistakes'){
    words=words.filter(w=>w.wrongCount>0);
  }
  return words;
}

function startGame(mode){
  let pool=getPool(mode);
  if(!pool.length){
    if(mode==='mistakes')toast('错题本为空！');
    else toast('没有可练习的单词');
    return;
  }
  pool=pool.sort(()=>Math.random()-.5);
  gs={mode,queue:pool,idx:0,hearts:5,correct:0,checked:false,typed:[]};
  if(mode!=='choice')initTyped();
  drawSourceSelector();
  drawGame();
  setTimeout(()=>{if(mode!=='choice')speak(gs.queue[0].word);},400);
}

function getThemeColor(){
  return practiceSource==='cet4'?'#db2777':practiceSource==='cet6'?'var(--purple-mid)':'var(--green-mid)';
}
function getPfillClass(){
  return practiceSource==='cet4'?'pfill-cet4':practiceSource==='cet6'?'pfill-cet6':'pfill-my';
}
function getCheckBtnClass(){
  return practiceSource==='cet4'?'check-btn check-btn-cet4':practiceSource==='cet6'?'check-btn check-btn-cet6':'check-btn check-btn-my';
}

function initTyped(){
  const w=gs.queue[gs.idx];
  gs.typed=new Array(w.word.length).fill('');
}

function drawGame(){
  const gc=document.getElementById('gc');
  if(!gc)return;
  if(!gs.queue?.length){gc.innerHTML='<div class="card" style="text-align:center;padding:2rem;color:var(--ink4);font-style:italic">选择题库和练习模式开始</div>';return;}
  if(gs.hearts<=0||gs.idx>=gs.queue.length){drawFinish();return;}
  if(gs.mode==='choice')drawChoice();else drawSpell();
}

function saveWordProgress(w,ok){
  if(w._src==='my'){
    const d=load(),dw=d.words.find(x=>x.id===w.id);
    if(dw){dw.practiceCount=(dw.practiceCount||0)+1;if(ok){if(dw.practiceCount>=3)dw.status='mastered';else if(dw.status==='new')dw.status='learning';}else{dw.wrongCount=(dw.wrongCount||0)+1;dw.status='learning';}save(d);}
  }else{
    const prog=getCetWord(w.id);
    prog.practiceCount=(prog.practiceCount||0)+1;
    if(ok){if(prog.practiceCount>=3)prog.status='mastered';else if(prog.status==='new')prog.status='learning';}
    else{prog.wrongCount=(prog.wrongCount||0)+1;prog.status='learning';}
    setCetWord(w.id,prog);
  }
}

function drawSpell(){
  const g=gs,w=g.queue[g.idx];
  const prog=Math.round(g.idx/g.queue.length*100);
  const totalL=w.word.replace(/ /g,'').length;
  const filledL=g.typed.filter((c,i)=>w.word[i]!==' '&&c).length;
  let slots='';
  for(let i=0;i<w.word.length;i++){
    if(w.word[i]===' '){slots+=`<div class="slot space"></div>`;continue;}
    const ch=g.typed[i]||'';
    let cls='slot';
    if(g.checked)cls+=ch.toLowerCase()===w.word[i].toLowerCase()?' correct':' wrong';
    else if(i===g.typed.filter((_,j)=>w.word[j]!==' ').length&&!ch)cls+=' active';
    slots+=`<div class="${cls}">${ch}</div>`;
  }
  const ROWS=[['q','w','e','r','t','y','u','i','o','p'],['a','s','d','f','g','h','j','k','l'],['z','x','c','v','b','n','m']];
  let keys='';
  ROWS.forEach(row=>{keys+=`<div class="krow">${row.map(k=>`<button class="key" onclick="pressKey('${k}')">${k}</button>`).join('')}</div>`;});
  keys+=`<div class="krow"><button class="key bs" onclick="backspace()">⌫ del</button></div>`;
  const fb=g.checked?(g.typed.join('').toLowerCase()===w.word.toLowerCase()?`<div class="feedback fb-ok">✓ 正确！</div>`:`<div class="feedback fb-fail">正确拼写：<strong>${w.word}</strong></div>`):'';
  const act=g.checked?`<button class="next-btn" onclick="nextWord()">继续 →</button>`:`<button class="${getCheckBtnClass()}"${filledL===totalL?'':' disabled'} onclick="checkSpell()">检查答案</button>`;
  const srcTag=w._src==='cet4'?'<span class="tag-cet4">四级</span>':w._src==='cet6'?'<span class="tag-cet6">六级</span>':'<span class="tag-my">生词</span>';
  document.getElementById('gc').innerHTML=`
<div class="game-wrap"><div class="card">
  <div class="hearts">${Array.from({length:5},(_,i)=>`<div style="width:20px;height:20px"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="${i<g.hearts?'#e24b4a':'#e0ddd6'}"/></svg></div>`).join('')}</div>
  <div class="pbar"><div class="pfill ${getPfillClass()}" style="width:${prog}%"></div></div>
  <p style="font-size:12px;color:var(--ink4);text-align:right;margin-bottom:1rem;font-family:sans-serif">${g.idx+1} / ${g.queue.length} ${srcTag}</p>
  <button class="speak-btn" onclick="speak('${w.word.replace(/'/g,"\\'")}')"><svg viewBox="0 0 24 24" style="width:36px;height:36px;fill:var(--ink3)"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.97z"/></svg></button>
  <p class="hint">点击喇叭播放发音，拼写单词</p>
  <div class="meaning-box"><div class="m-pos">${w.pos}</div><div class="m-cn">${w.meaning}</div><div class="m-ex">${w.example||''}</div></div>
  <div class="slots">${slots}</div>
  ${fb}<div class="kbd">${keys}</div>${act}
</div></div>`;}

function pressKey(k){
  if(gs.checked)return;
  const w=gs.queue[gs.idx].word;
  for(let i=0;i<w.length;i++){if(w[i]===' ')continue;if(!gs.typed[i]){gs.typed[i]=k;break;}}
  drawSpell();
  const tL=w.replace(/ /g,'').length,fL=gs.typed.filter((c,i)=>w[i]!==' '&&c).length;
  const b=document.querySelector('.check-btn');if(b)b.disabled=fL!==tL;
}
function backspace(){
  if(gs.checked)return;
  const w=gs.queue[gs.idx].word;
  for(let i=w.length-1;i>=0;i--){if(w[i]===' ')continue;if(gs.typed[i]){gs.typed[i]='';break;}}
  drawSpell();
}
function checkSpell(){
  gs.checked=true;
  const w=gs.queue[gs.idx];
  const ok=gs.typed.join('').toLowerCase()===w.word.toLowerCase();
  saveWordProgress(w,ok);
  if(ok)gs.correct++;else gs.hearts=Math.max(0,gs.hearts-1);
  drawSpell();
}
function nextWord(){
  gs.idx++;gs.checked=false;
  if(gs.idx<gs.queue.length){initTyped();drawGame();setTimeout(()=>speak(gs.queue[gs.idx].word),300);}
  else drawFinish();
}

function drawChoice(){
  const g=gs,w=g.queue[g.idx];
  const prog=Math.round(g.idx/g.queue.length*100);
  // 从同源词库取干扰项
  let pool=g.queue.filter(x=>x.id!==w.id).sort(()=>Math.random()-.5).slice(0,3);
  let opts=[w,...pool].sort(()=>Math.random()-.5);
  gs.choiceCorrect=w.id;
  const fb=g.checked?(g.choiceSelected===w.id?`<div class="feedback fb-ok">✓ 正确！</div>`:`<div class="feedback fb-fail">正确答案：${w.meaning}</div>`):'';
  const act=g.checked?`<button class="next-btn" onclick="nextWord()">继续 →</button>`:'';
  const srcTag=w._src==='cet4'?'<span class="tag-cet4">四级</span>':w._src==='cet6'?'<span class="tag-cet6">六级</span>':'<span class="tag-my">生词</span>';
  document.getElementById('gc').innerHTML=`
<div class="game-wrap"><div class="card">
  <div class="hearts">${Array.from({length:5},(_,i)=>`<div style="width:20px;height:20px"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="${i<g.hearts?'#e24b4a':'#e0ddd6'}"/></svg></div>`).join('')}</div>
  <div class="pbar"><div class="pfill ${getPfillClass()}" style="width:${prog}%"></div></div>
  <p style="font-size:12px;color:var(--ink4);text-align:right;margin-bottom:1rem;font-family:sans-serif">${g.idx+1} / ${g.queue.length} ${srcTag}</p>
  <div style="text-align:center;margin-bottom:1.5rem">
    <div style="font-size:28px;font-weight:700;font-family:'Lora',serif;margin-bottom:6px">${w.word}</div>
    <div style="font-size:13px;color:var(--gold-mid);font-style:italic">${w.phonetic||''}</div>
    <button class="speak-btn" style="width:52px;height:52px;margin:10px auto 0" onclick="speak('${w.word.replace(/'/g,"\\'")}')"><svg viewBox="0 0 24 24" style="width:24px;height:24px;fill:var(--ink3)"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.97z"/></svg></button>
  </div>
  <p style="font-size:12.5px;color:var(--ink4);text-align:center;margin-bottom:1rem;font-family:sans-serif">选择正确的中文释义</p>
  <div class="choice-grid">
    ${opts.map(o=>{let cls='choice-btn';if(g.checked){if(o.id===w.id)cls+=' show';else if(o.id===g.choiceSelected&&o.id!==w.id)cls+=' fail';}return`<button class="${cls}" onclick="selectChoice(${o.id})" ${g.checked?'disabled':''}>${o.meaning}</button>`;}).join('')}
  </div>
  ${fb}${act}
</div></div>`;}

function selectChoice(id){
  if(gs.checked)return;
  gs.checked=true;gs.choiceSelected=id;
  const ok=id===gs.choiceCorrect,w=gs.queue[gs.idx];
  saveWordProgress(w,ok);
  if(ok)gs.correct++;else gs.hearts=Math.max(0,gs.hearts-1);
  drawChoice();
}

function drawFinish(){
  const g=gs,total=g.queue.length,pct=Math.round(g.correct/total*100);
  const color=getThemeColor();
  document.getElementById('gc').innerHTML=`
<div class="game-wrap"><div class="card finish-center">
  <div class="finish-ico" style="background:${practiceSource==='cet4'?'#fdf2f8':practiceSource==='cet6'?'var(--purple-bg)':'var(--green-bg)'}">
    <svg viewBox="0 0 24 24" fill="${color}" style="width:34px;height:34px"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
  </div>
  <div style="font-size:20px;font-weight:700;font-family:'Noto Serif SC',serif;margin-bottom:6px">${g.hearts<=0?'本轮结束':'练习完成！'}</div>
  <div style="font-size:13px;color:var(--ink3);font-family:sans-serif">共 ${total} 个单词</div>
  <div class="finish-stats">
    <div class="fs"><div class="fs-n" style="color:var(--green)">${g.correct}</div><div class="fs-l">答对</div></div>
    <div class="fs"><div class="fs-n" style="color:var(--accent)">${total-g.correct}</div><div class="fs-l">答错</div></div>
    <div class="fs"><div class="fs-n">${pct}%</div><div class="fs-l">正确率</div></div>
  </div>
  <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
    <button class="btn btn-primary" onclick="startGame(gs.mode)">再练一轮</button>

  </div>
</div></div>`;}

let _wf='all';
function renderWords(d){
  const list=_wf==='all'?d.words:d.words.filter(w=>w.status===_wf);

  const lm={new:'待学习',learning:'学习中',mastered:'已掌握'};

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px">

</div>
<div class="chips">
  ${['all','new','learning','mastered'].map(s=>`<span class="chip${_wf===s?' on':''}" onclick="_wf='${s}';render()">${{all:'全部',new:'待学习',learning:'学习中',mastered:'已掌握'}[s]}</span>`).join('')}
</div>
<div class="card" style="padding:0;overflow:auto">
<table class="tbl">
<thead><tr><th>单词</th><th>释义</th><th>状态</th><th style="text-align:right">操作</th></tr></thead>
<tbody>
${list.map(w=>`<tr>
  <td><div class="w-en">${w.word}</div><div class="w-ph">${w.phonetic||''}</div></td>
  <td><div class="w-cn">${w.meaning}</div><div class="w-ex">${w.example||''}</div></td>

    <button class="btn btn-sm btn-danger" onclick="delWord(${w.id})">删除</button>
  </div></td>
</tr>`).join('')}
</tbody></table></div>`;}

function setStatus(id,s){const d=load(),w=d.words.find(w=>w.id===id);if(w){w.status=s;save(d);render();toast(s==='mastered'?'✓ 已标记掌握':'已重置');}}
function delWord(id){if(!confirm('确定删除？'))return;const d=load();d.words=d.words.filter(w=>w.id!==id);save(d);render();toast('已删除');}

let _cetLevel='cet4';
let _cetFilter='all';
let _cetSearch='';
function renderCet(){
  const cp=loadCetProgress();
  const words=_cetLevel==='cet4'?CET4_WORDS:CET6_WORDS;
  const bm={new:'b-new',learning:'b-learning',mastered:'b-mastered'};
  const lm={new:'待学习',learning:'学习中',mastered:'已掌握'};
  let list=words.map(w=>({...w,...getCetWord(w.id)}));
  if(_cetFilter!=='all')list=list.filter(w=>w.status===_cetFilter);
  if(_cetSearch)list=list.filter(w=>w.word.toLowerCase().includes(_cetSearch.toLowerCase())||w.meaning.includes(_cetSearch));

async function aiAutoFill(){
  const word=document.getElementById('f-word')?.value.trim();if(!word)return;
  const key=document.getElementById('f-dskey')?.value.trim()||loadCfg().dsKey;if(!key)return;
  saveCfg({dsKey:key});

  try{

    const data=await res.json();
    if(data.error){if(st)st.textContent='❌ 失败';toast('API错误');return;}

}

async function batchExtract(){
  const text=document.getElementById('b-text')?.value.trim();
  if(!text){toast('请先粘贴英文内容');return;}
  const key=document.getElementById('b-dskey')?.value.trim()||loadCfg().dsKey;
  if(!key){toast('请填写 DeepSeek API Key');return;}
  saveCfg({dsKey:key});

  const btn=document.getElementById('b-extract-btn');
  const status=document.getElementById('b-status');
  btn.disabled=true;btn.textContent='⏳ AI 分析中…';
  if(status)status.textContent='正在提取生词，请稍候…';

  try{
    const res=await fetch('https://api.deepseek.com/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({
        model:'deepseek-chat',
        max_tokens:2000,
        temperature:0.3,
        messages:[{role:'user',content:`从以下英文文本中提取5-15个有学习价值的英文单词或短语（排除简单词如 the/a/is/and 等），为每个词提供详细信息。

文本：
${text}

只返回JSON数组，格式如下（不要其他文字）：
[{"word":"单词","phonetic":"国际音标","pos":"词性中文","meaning":"中文释义","example":"原文中的例句或自造例句"}]`}]
      })
    });
    const data=await res.json();
    if(data.error){toast('API错误：'+data.error.message);return;}
    
    let content=data.choices[0].message.content.trim();
    content=content.replace(/```json|```/g,'').trim();
    const words=JSON.parse(content);
    
    const d=load();
    const existingWords=new Set(d.words.map(w=>w.word.toLowerCase()));
    
    batchWords=words.map(w=>({
      ...w,
      selected:!existingWords.has(w.word.toLowerCase()),
      exists:existingWords.has(w.word.toLowerCase())
    }));

    renderBatchResults();
    if(status)status.textContent=`提取到 ${words.length} 个生词`;
  }catch(e){
    toast('提取失败，请检查 API Key 或网络');
    console.error(e);
  }finally{
    btn.disabled=false;btn.textContent='🔍 AI 提取生词';
  }
}

function batchToggle(i,checked){
  batchWords[i].selected=checked;
  const card=document.getElementById('bwc-'+i);
  if(card){card.className='batch-word-card'+(checked?' selected':'')+(batchWords[i].exists?' exists':'');}
  // 更新按钮计数
  const sel=batchWords.filter(w=>w.selected).length;
  const btn=document.querySelector('#b-results .btn-primary');
  if(btn){btn.textContent=`加入词库 (${sel})`;btn.disabled=sel===0;}
  const header=document.querySelector('#b-results .btn-primary')?.closest('.card')?.querySelector('span[style*="ink4"]');
}

function batchSelectAll(sel){
  batchWords.forEach((w,i)=>{if(!w.exists){w.selected=sel;const card=document.getElementById('bwc-'+i);if(card)card.className='batch-word-card'+(sel?' selected':'');}});
  renderBatchResults();
}

function batchAddWords(){
  const toAdd=batchWords.filter(w=>w.selected&&!w.exists);
  if(!toAdd.length){toast('没有选中的新词');return;}
  const d=load();
  toAdd.forEach(w=>{
    d.words.push({
      id:d.nextId++,
      word:w.word,phonetic:w.phonetic||'',pos:w.pos||'',
      meaning:w.meaning,example:w.example||'',
      status:'new',wrongCount:0,practiceCount:0,
      addedAt:new Date().toISOString().split('T')[0],level:'my'
    });
  });
  save(d);
  toast(`✓ 已添加 ${toAdd.length} 个生词！`);
  gistPush();
  // 标记为已存在
  toAdd.forEach(w=>{
    const bw=batchWords.find(b=>b.word===w.word);
    if(bw){bw.exists=true;bw.selected=false;}
  });
  renderBatchResults();
}

}

let gs={};
let practiceSource='my';

function renderPractice(){
  document.getElementById('pg-practice').innerHTML=`
<div class="ph"><div class="ph-title">练习</div></div>
<div id="practice-inner" class="fade-up"></div>`;
  drawPracticeUI();
}

function drawPracticeUI(){
  const d=load();
  const inner=document.getElementById('practice-inner');
  if(!inner)return;
  if(gs.mode){drawGame();return;}

<div class="mode-pills">

  <button class="mode-pill${gs.mode==='choice'?' on-'+practiceSource:''}" onclick="startGame('choice')">✅ 选择题</button>
  <button class="mode-pill${gs.mode==='mistakes'?' on-'+practiceSource:''}" onclick="startGame('mistakes')">📌 练错题</button>
</div>
<div style="padding:0 1rem;margin-top:.5rem">
  <div style="background:var(--bg3);border-radius:var(--r2);padding:1rem;font-size:13px;color:var(--ink3);text-align:center">

  </div>
</div>`;
}

function selSrc(s){
  practiceSource=s;
  drawPracticeUI();
}

function getPool(mode){
  const d=load();
  let words=[];
  if(practiceSource==='my'||practiceSource==='all') words=[...words,...d.words.map(w=>({...w,_src:'my'}))];
  if(practiceSource==='cet4'||practiceSource==='all') words=[...words,...CET4_WORDS.map(w=>({...w,...getCetWord(w.id),_src:'cet4'}))];
  if(practiceSource==='cet6'||practiceSource==='all') words=[...words,...CET6_WORDS.map(w=>({...w,...getCetWord(w.id),_src:'cet6'}))];
  if(mode==='mistakes') words=words.filter(w=>w.wrongCount>0);
  return words;
}

function getAccentColor(){
  return practiceSource==='cet4'?'var(--cet4)':practiceSource==='cet6'?'var(--cet6)':practiceSource==='all'?'var(--info)':'var(--primary)';
}
function getCbClass(){
  return 'check-btn cb-'+(practiceSource==='cet4'?'cet4':practiceSource==='cet6'?'cet6':practiceSource==='all'?'all':'my');
}

function startGame(mode){
  let pool=getPool(mode);
  if(!pool.length){toast(mode==='mistakes'?'错题本为空！':'没有可练习的单词');return;}
  pool=pool.sort(()=>Math.random()-.5);
  gs={mode,queue:pool,idx:0,hearts:5,correct:0,checked:false,typed:[]};
  if(mode!=='choice')initTyped();
  drawGame();
  setTimeout(()=>{if(mode!=='choice')speak(gs.queue[0].word);},500);
}

function initTyped(){
  const w=gs.queue[gs.idx];
  gs.typed=new Array(w.word.length).fill('');
}

function drawGame(){
  const inner=document.getElementById('practice-inner');
  if(!inner)return;
  if(!gs.queue?.length){drawPracticeUI();return;}
  if(gs.hearts<=0||gs.idx>=gs.queue.length){drawFinish();return;}
  if(gs.mode==='choice')drawChoice();else drawSpell();
}

function saveWordProgress(w,ok){
  if(w._src==='my'){
    const d=load(),dw=d.words.find(x=>x.id===w.id);
    if(dw){dw.practiceCount=(dw.practiceCount||0)+1;if(ok){if(dw.practiceCount>=3)dw.status='mastered';else if(dw.status==='new')dw.status='learning';}else{dw.wrongCount=(dw.wrongCount||0)+1;dw.status='learning';}save(d);}
  }else{
    const prog=getCetWord(w.id);
    prog.practiceCount=(prog.practiceCount||0)+1;
    if(ok){if(prog.practiceCount>=3)prog.status='mastered';else if(!prog.status||prog.status==='new')prog.status='learning';}
    else{prog.wrongCount=(prog.wrongCount||0)+1;prog.status='learning';}
    setCetWord(w.id,prog);
  }
}

function drawSpell(){
  const g=gs,w=g.queue[g.idx];
  const prog=Math.round(g.idx/g.queue.length*100);
  const totalL=w.word.replace(/ /g,'').length;
  const filledL=g.typed.filter((c,i)=>w.word[i]!==' '&&c).length;
  let slots='';
  for(let i=0;i<w.word.length;i++){
    if(w.word[i]===' '){slots+=`<div class="slot space"></div>`;continue;}
    const ch=g.typed[i]||'';
    let cls='slot';
    if(g.checked)cls+=ch.toLowerCase()===w.word[i].toLowerCase()?' correct':' wrong';
    else if(i===g.typed.filter((_,j)=>w.word[j]!==' ').length&&!ch)cls+=' active';
    slots+=`<div class="${cls}">${ch}</div>`;
  }
  const ROWS=[['q','w','e','r','t','y','u','i','o','p'],['a','s','d','f','g','h','j','k','l'],['z','x','c','v','b','n','m']];
  let keys='';
  ROWS.forEach(row=>{keys+=`<div class="krow">${row.map(k=>`<button class="key" onclick="pressKey('${k}')">${k}</button>`).join('')}</div>`;});
  keys+=`<div class="krow"><button class="key bs" onclick="backspace()">⌫</button></div>`;
  const srcTag=w._src==='cet4'?'<span class="src-tag st-cet4">四级</span>':w._src==='cet6'?'<span class="src-tag st-cet6">六级</span>':'<span class="src-tag st-my">生词</span>';
  const fb=g.checked?(g.typed.join('').toLowerCase()===w.word.toLowerCase()?`<div class="fb fb-ok">✓ 正确！</div>`:`<div class="fb fb-fail">正确拼写：<strong>${w.word}</strong></div>`):'';
  const act=g.checked?`<button class="next-btn" onclick="nextWord()">继续 →</button>`:`<button class="${getCbClass()}"${filledL===totalL?'':' disabled'} onclick="checkSpell()">检查答案</button>`;
  document.getElementById('practice-inner').innerHTML=`
<div class="game-area fade-up">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.875rem">
    <div class="hearts-row">${Array.from({length:5},(_,i)=>`<svg class="h-icon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="${i<g.hearts?'#ef4444':'#e4e4e7'}"/></svg>`).join('')}</div>
    <div style="font-size:12px;color:var(--ink4);font-weight:500">${g.idx+1}/${g.queue.length} ${srcTag}</div>
  </div>
  <div style="height:6px;background:var(--bg3);border-radius:3px;margin-bottom:1.25rem;overflow:hidden"><div style="height:100%;width:${prog}%;background:${getAccentColor()};border-radius:3px;transition:width .4s"></div></div>
  <button class="speak-circle" onclick="speak('${w.word.replace(/'/g,"\'")}')">
    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.97z"/></svg>
  </button>
  <p style="text-align:center;font-size:12px;color:var(--ink4);margin-bottom:1rem">点击播放发音</p>
  <div class="meaning-pill"><div class="mp-pos">${w.pos}</div><div class="mp-cn">${w.meaning}</div><div class="mp-ex">${w.example||''}</div></div>
  <div class="slots-row">${slots}</div>
  ${fb}
  <div class="kbd-wrap">${keys}</div>
  ${act}
  <button class="btn btn-ghost btn-full" style="margin-top:.625rem" onclick="gs={};drawPracticeUI()">退出练习</button>
</div>`;
}

function pressKey(k){
  if(gs.checked)return;
  const w=gs.queue[gs.idx].word;
  for(let i=0;i<w.length;i++){if(w[i]===' ')continue;if(!gs.typed[i]){gs.typed[i]=k;break;}}
  drawSpell();
  const tL=w.replace(/ /g,'').length,fL=gs.typed.filter((c,i)=>w[i]!==' '&&c).length;
  const b=document.querySelector('.check-btn');if(b)b.disabled=fL!==tL;
}
function backspace(){
  if(gs.checked)return;
  const w=gs.queue[gs.idx].word;
  for(let i=w.length-1;i>=0;i--){if(w[i]===' ')continue;if(gs.typed[i]){gs.typed[i]='';break;}}
  drawSpell();
}
function checkSpell(){
  gs.checked=true;
  const w=gs.queue[gs.idx];
  const ok=gs.typed.join('').toLowerCase()===w.word.toLowerCase();
  saveWordProgress(w,ok);
  if(ok)gs.correct++;else gs.hearts=Math.max(0,gs.hearts-1);
  drawSpell();
}
function nextWord(){
  gs.idx++;gs.checked=false;
  if(gs.idx<gs.queue.length){initTyped();drawGame();setTimeout(()=>speak(gs.queue[gs.idx].word),300);}
  else drawFinish();
}

function drawChoice(){
  const g=gs,w=g.queue[g.idx];
  const prog=Math.round(g.idx/g.queue.length*100);
  const others=g.queue.filter(x=>x.id!==w.id).sort(()=>Math.random()-.5).slice(0,3);
  const opts=[w,...others].sort(()=>Math.random()-.5);
  gs.choiceCorrect=w.id;
  const srcTag=w._src==='cet4'?'<span class="src-tag st-cet4">四级</span>':w._src==='cet6'?'<span class="src-tag st-cet6">六级</span>':'<span class="src-tag st-my">生词</span>';
  const fb=g.checked?(g.choiceSelected===w.id?`<div class="fb fb-ok">✓ 正确！</div>`:`<div class="fb fb-fail">正确：${w.meaning}</div>`):'';
  const act=g.checked?`<button class="next-btn" onclick="nextWord()">继续 →</button>`:'';
  document.getElementById('practice-inner').innerHTML=`
<div class="game-area fade-up">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.875rem">
    <div class="hearts-row">${Array.from({length:5},(_,i)=>`<svg class="h-icon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="${i<g.hearts?'#ef4444':'#e4e4e7'}"/></svg>`).join('')}</div>
    <div style="font-size:12px;color:var(--ink4);font-weight:500">${g.idx+1}/${g.queue.length} ${srcTag}</div>
  </div>
  <div style="height:6px;background:var(--bg3);border-radius:3px;margin-bottom:1.5rem;overflow:hidden"><div style="height:100%;width:${prog}%;background:${getAccentColor()};border-radius:3px;transition:width .4s"></div></div>
  <div style="text-align:center;margin-bottom:1.5rem">
    <div style="font-size:30px;font-weight:700;font-family:'DM Serif Display',serif;margin-bottom:.375rem">${w.word}</div>
    <div style="font-size:13px;color:var(--warning);font-style:italic;margin-bottom:.75rem">${w.phonetic||''}</div>
    <button class="speak-circle" style="width:52px;height:52px;margin:.25rem auto" onclick="speak('${w.word.replace(/'/g,"\'")}')">
      <svg viewBox="0 0 24 24" style="width:24px;height:24px"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.97z"/></svg>
    </button>
  </div>
  <p style="text-align:center;font-size:12.5px;color:var(--ink4);margin-bottom:.875rem">选择正确的中文释义</p>
  <div class="choice-grid">
    ${opts.map(o=>{let cls='ch-btn';if(g.checked){if(o.id===w.id)cls+=' show';else if(o.id===g.choiceSelected)cls+=' fail';}return`<button class="${cls}" onclick="selectChoice(${o.id})" ${g.checked?'disabled':''}>${o.meaning}</button>`;}).join('')}
  </div>
  ${fb}${act}
  <button class="btn btn-ghost btn-full" style="margin-top:.625rem" onclick="gs={};drawPracticeUI()">退出练习</button>
</div>`;
}

function selectChoice(id){
  if(gs.checked)return;
  gs.checked=true;gs.choiceSelected=id;
  const ok=id===gs.choiceCorrect,w=gs.queue[gs.idx];
  saveWordProgress(w,ok);
  if(ok)gs.correct++;else gs.hearts=Math.max(0,gs.hearts-1);
  drawChoice();
}

function drawFinish(){
  const g=gs,total=g.queue.length,pct=Math.round(g.correct/total*100);
  const emoji=pct>=90?'🏆':pct>=70?'🎉':pct>=50?'💪':'📖';
  document.getElementById('practice-inner').innerHTML=`
<div class="finish-card fade-up">
  <span class="finish-emoji">${emoji}</span>
  <div class="finish-title">${g.hearts<=0?'本轮结束':'完成！'}</div>
  <div style="font-size:13px;color:var(--ink3)">共 ${total} 个单词</div>
  <div class="finish-stats">
    <div class="fs"><div class="fs-n" style="color:var(--success)">${g.correct}</div><div class="fs-l">答对</div></div>
    <div class="fs"><div class="fs-n" style="color:var(--primary)">${total-g.correct}</div><div class="fs-l">答错</div></div>
    <div class="fs"><div class="fs-n">${pct}%</div><div class="fs-l">正确率</div></div>
  </div>
  <div style="display:flex;flex-direction:column;gap:.625rem">
    <button class="btn btn-primary btn-full" onclick="startGame(gs.mode)">再练一轮</button>
    <button class="btn btn-ghost btn-full" onclick="gs={};drawPracticeUI()">换个模式</button>
  </div>
</div>`;
}

async function aiAutoFill(){
  const word=document.getElementById('f-word')?.value.trim();if(!word)return;
  const key=loadCfg().dsKey;if(!key)return;
  const st=document.getElementById('ai-st');if(st)st.textContent='⏳';
  try{
    const res=await fetch('https://api.deepseek.com/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:'deepseek-chat',max_tokens:200,temperature:0.3,messages:[{role:'user',content:`为英文单词"${word}"返回JSON（只返回JSON）：{"phonetic":"国际音标","pos":"词性中文","meaning":"中文释义简洁","example":"简单英文例句"}`}]})});
    const data=await res.json();
    if(data.error){if(st)st.textContent='❌';return;}
    const j=JSON.parse(data.choices[0].message.content.trim().replace(/\`\`\`json|\`\`\`/g,'').trim());
    document.getElementById('f-ph').value=j.phonetic||'';
    document.getElementById('f-pos').value=j.pos||'';
    document.getElementById('f-mean').value=j.meaning||'';
    document.getElementById('f-ex').value=j.example||'';
    if(st){st.textContent='✅';setTimeout(()=>{st.textContent=''},2000);}
  }catch(e){if(st)st.textContent='❌';}
}

function addWord(){
  const word=document.getElementById('f-word')?.value.trim();
  const mean=document.getElementById('f-mean')?.value.trim();
  if(!word||!mean){toast('请填写单词和释义');return;}
  const d=load();
  if(d.words.find(w=>w.word.toLowerCase()===word.toLowerCase())){toast('该单词已存在！');return;}
  d.words.push({id:d.nextId++,word,phonetic:document.getElementById('f-ph').value.trim(),pos:document.getElementById('f-pos').value.trim(),meaning:mean,example:document.getElementById('f-ex').value.trim(),status:'new',wrongCount:0,practiceCount:0,addedAt:new Date().toISOString().split('T')[0],level:'my'});
  save(d);toast(`✓ 已添加「${word}」`);clearForm();gistPush();
}
function clearForm(){['f-word','f-ph','f-pos','f-mean','f-ex'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});}

async function batchExtract(){
  const text=document.getElementById('b-text')?.value.trim();
  if(!text){toast('请粘贴英文内容');return;}
  const key=loadCfg().dsKey;
  if(!key){toast('请填写 DeepSeek API Key');return;}
  const btn=document.getElementById('b-btn'),st=document.getElementById('b-status');
  btn.disabled=true;btn.textContent='⏳ 分析中…';if(st)st.textContent='';
  try{
    const res=await fetch('https://api.deepseek.com/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:'deepseek-chat',max_tokens:2000,temperature:0.3,messages:[{role:'user',content:`从以下英文文本提取5-15个有学习价值的单词（排除 the/a/is 等简单词），返回JSON数组（只返回JSON）：
[{"word":"单词","phonetic":"音标","pos":"词性中文","meaning":"中文释义","example":"例句"}]

文本：${text}`}]})});
    const data=await res.json();
    if(data.error){toast('API错误');return;}
    let txt=data.choices[0].message.content.trim().replace(/\`\`\`json|\`\`\`/g,'').trim();
    const words=JSON.parse(txt);
    const d=load();
    const existing=new Set(d.words.map(w=>w.word.toLowerCase()));
    batchWords=words.map(w=>({...w,selected:!existing.has(w.word.toLowerCase()),exists:existing.has(w.word.toLowerCase())}));
    if(st)st.textContent=`提取到 ${words.length} 个词`;
    renderBatchResults();
  }catch(e){toast('提取失败，检查 API Key 或网络');}
  finally{btn.disabled=false;btn.textContent='🔍 AI 提取生词';}
}

function renderBatchResults(){
  const sel=batchWords.filter(w=>w.selected).length;
  const container=document.getElementById('b-results');
  if(!container)return;
  container.innerHTML=`
<div style="display:flex;justify-content:space-between;align-items:center;padding:.75rem 1rem;border-bottom:0.5px solid var(--line);background:var(--bg2)">
  <span style="font-size:13px;color:var(--ink3);font-weight:500">已选 ${sel} / ${batchWords.length} 个</span>
  <div style="display:flex;gap:.5rem">
    <button class="btn btn-sm btn-ghost" onclick="batchSelectAll(true)">全选</button>
    <button class="btn btn-sm btn-primary" onclick="batchAddWords()" ${sel===0?'disabled':''}>加入词库(${sel})</button>
  </div>
</div>
<div class="card-flush">
${batchWords.map((w,i)=>`
<div class="batch-item${w.selected?' sel':''}${w.exists?' exists':''}" id="bi-${i}">
  <input type="checkbox" class="batch-check" ${w.selected?'checked':''} ${w.exists?'disabled':''} onchange="batchToggle(${i},this.checked)">
  <div style="flex:1;min-width:0">
    <div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap">
      <span class="bi-en">${w.word}</span>
      <span class="bi-ph">${w.phonetic||''}</span>
      <span class="badge ${w.exists?'b-learning':'b-new'}" style="font-size:10px">${w.exists?'已有':'新词'}</span>
    </div>
    <div class="bi-cn"><span style="font-size:11px;color:var(--ink4);margin-right:4px">${w.pos||''}</span>${w.meaning}</div>
    <div class="bi-ex">${w.example||''}</div>
  </div>
</div>`).join('')}
</div>`;
}

function batchToggle(i,checked){
  batchWords[i].selected=checked;
  const item=document.getElementById('bi-'+i);
  if(item)item.className='batch-item'+(checked?' sel':'')+(batchWords[i].exists?' exists':'');
  const sel=batchWords.filter(w=>w.selected).length;
  const header=document.querySelector('#b-results .btn-primary');
  if(header){header.textContent=`加入词库(${sel})`;header.disabled=sel===0;}
  const cnt=document.querySelector('#b-results [style*="ink3"]');
  if(cnt)cnt.textContent=`已选 ${sel} / ${batchWords.length} 个`;
}
function batchSelectAll(sel){
  batchWords.forEach((w,i)=>{if(!w.exists){w.selected=sel;const el=document.getElementById('bi-'+i);if(el)el.className='batch-item'+(sel?' sel':'');}});
  renderBatchResults();
}
function batchAddWords(){
  const toAdd=batchWords.filter(w=>w.selected&&!w.exists);
  if(!toAdd.length){toast('没有选中的新词');return;}
  const d=load();
  toAdd.forEach(w=>{d.words.push({id:d.nextId++,word:w.word,phonetic:w.phonetic||'',pos:w.pos||'',meaning:w.meaning,example:w.example||'',status:'new',wrongCount:0,practiceCount:0,addedAt:new Date().toISOString().split('T')[0],level:'my'});});
  save(d);toast(`✓ 已添加 ${toAdd.length} 个生词！`);gistPush();
  toAdd.forEach(w=>{const bw=batchWords.find(b=>b.word===w.word);if(bw){bw.exists=true;bw.selected=false;}});
  renderBatchResults();
}

// keyboard for spelling
document.addEventListener('keydown',e=>{
  if(page!=='practice'||!gs.mode||gs.mode==='choice')return;
  if(e.key==='Backspace'){e.preventDefault();backspace();return;}
  if(e.key==='Enter'&&!gs.checked){const b=document.querySelector('.check-btn');if(b&&!b.disabled)checkSpell();return;}
  if(e.key==='Enter'&&gs.checked){nextWord();return;}
  if(/^[a-zA-Z]$/.test(e.key))pressKey(e.key.toLowerCase());
});

render();
setTimeout(async()=>{await gistSync();render();},800);
</script>
</body>
</html>
